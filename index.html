// ═══════════════ ORDERS (정렬+필터) ═══════════════
function cleanDate(d){if(!d)return'';return d.replace(/\s+(오전|오후)\s+\d+:\d+:\d+/,'').replace(/\s+-?\d+$/,'').trim()}
function pgOrd(){
  let poList=D.po.filter(p=>p.vendor!=='nan'&&p.item_name!=='nan');
  const selMs=getSelectedMonths();
  if(S.selMonth!=='all'){
    const selSet=new Set(selMs.map(m=>m.replace('-','/')));
    poList=poList.filter(p=>{const pm=p.date_no.substring(0,7).replace('-','/');return selSet.has(pm)});
  }
  // Column-based filter
  if(S.ordFilterCol!=='all'&&S.ordFilterVal!=='all'){
    poList=poList.filter(p=>{
      if(S.ordFilterCol==='vendor')return p.vendor===S.ordFilterVal;
      if(S.ordFilterCol==='manager')return p.manager===S.ordFilterVal;
      if(S.ordFilterCol==='item')return p.item_name===S.ordFilterVal;
      if(S.ordFilterCol==='status')return p.status===S.ordFilterVal;
      if(S.ordFilterCol==='date')return cleanDate(p.date_no)===S.ordFilterVal;
      return true;
    });
  }
  if(S.search){const q=S.search.toLowerCase();poList=poList.filter(p=>p.item_name.toLowerCase().includes(q)||p.vendor.toLowerCase().includes(q)||p.manager.toLowerCase().includes(q))}

  // Sort
  const getter=(p,col)=>{
    if(col==='date')return p.date_no;
    if(col==='vendor')return p.vendor;
    if(col==='manager')return p.manager;
    if(col==='item')return p.item_name;
    if(col==='due')return p.due_date;
    if(col==='lead'){const ld=calcLeadDays(p.date_no.split(' ')[0],p.due_date.trim());return ld||0}
    if(col==='amount')return p.amount;
    if(col==='status')return p.status;
    return'';
  };
  poList=sortArr(poList,S.ordSort.col,S.ordSort.dir,getter);

  const comp=poList.filter(p=>p.status==='완료').length;
  const tot=poList.reduce((s,p)=>s+p.amount,0);
  const vendors=[...new Set(D.po.map(p=>p.vendor))].sort();
  const statuses=[...new Set(D.po.map(p=>p.status))];
  const sortIcon=(col)=>S.ordSort.col===col?(S.ordSort.dir==='asc'?'▲':'▼'):'↕';

  const avgAmt=poList.length>0?tot/poList.length:0;
  const uVendors=[...new Set(poList.map(p=>p.vendor))].length;
  const leads=poList.map(p=>calcLeadDays(p.date_no.split(' ')[0],p.due_date.trim())).filter(v=>v!=null&&!isNaN(v));
  const avgLead=leads.length>0?Math.round(leads.reduce((s,v)=>s+v,0)/leads.length):0;
  const maxLead=leads.length>0?Math.max(...leads):0;
  const compRate=poList.length>0?(comp/poList.length*100).toFixed(0):0;

  return`<div class="kpi-sticky"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-size:18px">발주 관리</h2>${periodBar()}</div>
  ${noDataNotice()}
  <div class="kr">
    <div class="kc"><div class="lb">총 발주</div><div class="vl c-bl">${poList.length}건</div><div class="sb">${fmtM(tot)}</div></div>
    <div class="kc"><div class="lb">건당 평균금액</div><div class="vl">${fmtM(avgAmt)}</div></div>
    <div class="kc"><div class="lb">완료율</div><div class="vl ${compRate>=80?'c-gn':compRate>=50?'c-yl':'c-rd'}">${compRate}%</div><div class="sb">${comp}/${poList.length}건</div></div>
    <div class="kc"><div class="lb">거래처수</div><div class="vl c-pp">${uVendors}개사</div></div>
    <div class="kc"><div class="lb">평균 소요일</div><div class="vl c-cy">${avgLead}일</div><div class="sb">최대 ${maxLead}일</div></div>
  </div></div>
  <div class="g2" style="margin-bottom:16px">
    <div class="pn"><div class="pt">월별 발주 추이 <span class="badge">${S.selYear}년</span></div><div class="cc"><canvas id="cOrdTrend" aria-label="월별 발주 추이 차트" role="img"></canvas></div></div>
    <div class="pn"><div class="pt">거래처별 발주 현황 <span class="badge">${S.selYear}년</span></div><div class="cc"><canvas id="cOrdVendor" aria-label="거래처별 발주 현황 차트" role="img"></canvas></div></div>
  </div>
  ${(()=>{
    // 발주 캘린더 뷰
    const calMs=selMs.length>0?selMs:[S.selYear+'-01'];
    const allPO=D.po.filter(p=>p.vendor!=='nan'&&p.item_name!=='nan');
    const ordDates={},dueDates={},compDates={};
    allPO.forEach(p=>{
      const od=cleanDate(p.date_no).replace(/\//g,'-');
      const dd=cleanDate(p.due_date).replace(/\//g,'-');
      if(od){if(!ordDates[od])ordDates[od]=[];ordDates[od].push(p)}
      if(dd){if(!dueDates[dd])dueDates[dd]=[];dueDates[dd].push(p)}
      if(p.status==='완료'&&dd){if(!compDates[dd])compDates[dd]=[];compDates[dd].push(p)}
    });
    // 미완료 발주의 납기월 추가 (선택 기간 밖 미완료 건도 캘린더에 표시)
    const pendingDueMs=new Set();
    allPO.filter(p=>p.status!=='완료').forEach(p=>{
      const dd=cleanDate(p.due_date).replace(/\//g,'-');
      if(dd&&dd.length>=7) pendingDueMs.add(dd.slice(0,7));
    });
    const wkNames=['일','월','화','수','목','금','토'];
    const today=new Date().toISOString().slice(0,10);
    const cf=S.calFilter; // all, ord, due, comp
    const baseMsSet=new Set(calMs.map(m=>m.slice(0,7)));
    const isSingleMonth=(S.selPeriodMode==='month'&&S.selMonth!=='all');
    if(!isSingleMonth) pendingDueMs.forEach(m=>{if(m.startsWith(S.selYear))baseMsSet.add(m)});
    const uniMs=[...baseMsSet].sort();
    return`<div class="pn" style="padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="pt" style="margin-bottom:0">발주 캘린더</div>
        <div style="display:flex;gap:4px">
          <span class="month-btn ${cf==='all'?'active':''}" onclick="S.calFilter='all';render()">전체</span>
          <span class="month-btn ${cf==='ord'?'active':''}" onclick="S.calFilter='ord';render()"><span class="cal-dot ord" style="margin-right:3px"></span>발주일</span>
          <span class="month-btn ${cf==='due'?'active':''}" onclick="S.calFilter='due';render()"><span class="cal-dot due" style="margin-right:3px"></span>납기일</span>
          <span class="month-btn ${cf==='comp'?'active':''}" onclick="S.calFilter='comp';render()"><span class="cal-dot comp" style="margin-right:3px"></span>완료</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px">
      ${uniMs.map(ym=>{
        const [yr2,mo2]=ym.split('-').map(Number);
        const firstDay=new Date(yr2,mo2-1,1).getDay();
        const daysInMonth=new Date(yr2,mo2,0).getDate();
        const cells2=[];
        for(let i=0;i<firstDay;i++) cells2.push(null);
        for(let d=1;d<=daysInMonth;d++) cells2.push(d);
        const dateKey=d=>yr2+'-'+String(mo2).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const wkH=wkNames.map(w=>'<div class="cal-wk">'+w+'</div>').join('');
        const cellsH=cells2.map(d=>{
          if(d===null) return'<div></div>';
          const dk=dateKey(d);
          const oC=(ordDates[dk]||[]).length;
          const dC=(dueDates[dk]||[]).length;
          const cpC=(compDates[dk]||[]).length;
          const hasAny=oC+dC+cpC>0;
          const isToday=dk===today;
          const showO=cf==='all'||cf==='ord';
          const showD=cf==='all'||cf==='due';
          const showC=cf==='all'||cf==='comp';
          const visCount=(showO?oC:0)+(showD?dC:0)+(showC?cpC:0);
          const cls='cal-cell'+(isToday?' today':'')+(hasAny?' has-ev':'');
          const oc=hasAny?"openCalDay('"+dk+"')":'';
          let dots='';
          if(showO&&oC>0) dots+='<span class="cal-dot ord"></span>'.repeat(Math.min(oC,4));
          if(showD&&dC>0) dots+='<span class="cal-dot due"></span>'.repeat(Math.min(dC,4));
          if(showC&&cpC>0) dots+='<span class="cal-dot comp"></span>'.repeat(Math.min(cpC,3));
          const cntH=visCount>0?'<div class="cal-cnt">'+visCount+'건</div>':'';
          return'<div class="'+cls+'" onclick="'+oc+'" title="'+dk+': 발주'+oC+' 납기'+dC+' 완료'+cpC+'"><div class="day">'+d+'</div><div class="dots">'+dots+'</div>'+cntH+'</div>';
        }).join('');
        return'<div><div style="font-size:12px;font-weight:600;color:var(--ac);margin-bottom:6px">'+yr2+'년 '+mo2+'월</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">'+wkH+cellsH+'</div></div>';
      }).join('')}
      </div>
      <div class="cal-legend">
        <span><span class="cal-dot ord"></span> 발주일</span>
        <span><span class="cal-dot due"></span> 납기일</span>
        <span><span class="cal-dot comp"></span> 완료</span>
      </div>
    </div>`;
  })()}
  <div class="tb">
    <input type="text" id="ordSearchInput" aria-label="발주 검색" placeholder="품목/거래처/담당 검색 후 버튼 클릭..." value="${S.search}" onkeydown="if(event.key==='Enter'){S.search=this.value;render()}" style="width:260px">
    <div class="btn primary" onclick="S.search=document.getElementById('ordSearchInput').value;render()">검색</div>
    ${S.search||S.ordFilterVal!=='all'?`<div class="btn" onclick="S.search='';S.ordFilterCol='all';S.ordFilterVal='all';render()">초기화</div>`:''}
    <select onchange="S.ordFilterCol=this.value;S.ordFilterVal='all';render()">
      <option value="all">필터 항목 선택</option>
      <option value="vendor" ${S.ordFilterCol==='vendor'?'selected':''}>거래처</option>
      <option value="manager" ${S.ordFilterCol==='manager'?'selected':''}>담당자</option>
      <option value="item" ${S.ordFilterCol==='item'?'selected':''}>품목</option>
      <option value="status" ${S.ordFilterCol==='status'?'selected':''}>상태</option>
    </select>
    ${S.ordFilterCol!=='all'?(()=>{
      const base=D.po.filter(p=>p.vendor!=='nan'&&p.item_name!=='nan');
      let vals=[];
      if(S.ordFilterCol==='vendor')vals=[...new Set(base.map(p=>p.vendor))].sort();
      if(S.ordFilterCol==='manager')vals=[...new Set(base.map(p=>p.manager))].sort();
      if(S.ordFilterCol==='item')vals=[...new Set(base.map(p=>p.item_name))].sort();
      if(S.ordFilterCol==='status')vals=[...new Set(base.map(p=>p.status))];
      return`<select onchange="S.ordFilterVal=this.value;render()">
        <option value="all">전체</option>
        ${vals.map(v=>`<option value="${v.replace(/"/g,'&quot;')}" ${S.ordFilterVal===v?'selected':''}>${v.length>25?v.slice(0,25)+'...':v}</option>`).join('')}
      </select>`;
    })():''}
    <span style="font-size:11px;color:var(--tx2)">${poList.length}건 / ${fmtM(tot)}</span>
    <button class="xlsx-btn" onclick="exportTableCSV(this,'발주현황')">📥 엑셀</button>
  </div>
  <div class="pn" style="padding:0"><div class="st" style="max-height:600px"><table>
    <thead><tr>
      <th class="sortable" onclick="toggleOrdSort('date')">일자 ${sortIcon('date')}</th>
      <th class="sortable" onclick="toggleOrdSort('vendor')">거래처 ${sortIcon('vendor')}</th>
      <th class="sortable" onclick="toggleOrdSort('manager')">담당 ${sortIcon('manager')}</th>
      <th class="sortable" onclick="toggleOrdSort('item')">품목 ${sortIcon('item')}</th>
      <th class="sortable" onclick="toggleOrdSort('due')">납기일 ${sortIcon('due')}</th>
      <th class="sortable tr" onclick="toggleOrdSort('lead')" style="color:var(--ac2)">소요일 ${sortIcon('lead')}</th>
      <th class="sortable tr" onclick="toggleOrdSort('amount')">금액 ${sortIcon('amount')}</th>
      <th class="sortable" onclick="toggleOrdSort('status')">상태 ${sortIcon('status')}</th>
    </tr></thead>
    <tbody>${poList.map((p,idx)=>{
      const ld=calcLeadDays(p.date_no.split(' ')[0],p.due_date.trim());
      return`<tr class="clickable" onclick="openOrder(${D.po.indexOf(p)})"><td style="white-space:nowrap">${cleanDate(p.date_no)}</td><td>${p.vendor}</td><td>${p.manager}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.item_name}</td>
      <td style="white-space:nowrap">${cleanDate(p.due_date)}</td>
      <td class="tr" style="color:var(--ac2)">${ld!=null?ld+'일':'-'}</td>
      <td class="tr">${fmtM(p.amount)}</td>
      <td><span class="tg ${p.status==='완료'?'tg-g':p.status==='진행중'?'tg-y':'tg-r'}">${p.status}</span></td></tr>`}).join('')}</tbody></table></div></div>`;
}

// ═══════════════ SALES ═══════════════
function pgSales(){
  const selMs=getSelectedMonths();
  const mLabel=periodLabel();
  const cItems=D.isd.filter(i=>i.type.includes('C'));
  const bItems=D.isd.filter(i=>i.type.includes('B'));

  // Period-aware totals
  const cSelTotal=cItems.reduce((s,i)=>selMs.reduce((ss,m)=>ss+(i.monthly[m]?i.monthly[m].amt:0),s),0);
  const bSelTotal=bItems.reduce((s,i)=>selMs.reduce((ss,m)=>ss+(i.monthly[m]?i.monthly[m].amt:0),s),0);
  const selTotal=cSelTotal+bSelTotal;
  const cSelQty=cItems.reduce((s,i)=>selMs.reduce((ss,m)=>ss+(i.monthly[m]?i.monthly[m].qty:0),s),0);
  const bSelQty=bItems.reduce((s,i)=>selMs.reduce((ss,m)=>ss+(i.monthly[m]?i.monthly[m].qty:0),s),0);
  const selQty=cSelQty+bSelQty;
  const selItemCnt=[...new Set(D.isd.filter(i=>selMs.some(m=>i.monthly[m]&&i.monthly[m].qty>0)).map(i=>i.sku_id))].length;

  // 전월대비 증감률
  let prevMs=[];
  if(selMs.length===1){
    const allMs=[...M25,...M26];
    const idx=allMs.indexOf(selMs[0]);
    if(idx>0) prevMs=[allMs[idx-1]];
  } else if(S.selMonth!=='all'&&S.selMonth.startsWith('Q')){
    const qMap={Q1:'Q4',Q2:'Q1',Q3:'Q2',Q4:'Q3'};
    const prevQ=qMap[S.selMonth];
    const prevYr=S.selMonth==='Q1'?'2025':S.selYear;
    prevMs=getQuarterMonths(prevQ,prevYr);
  }
  const prevTotal=prevMs.length>0?D.isd.reduce((s,i)=>prevMs.reduce((ss,m)=>ss+(i.monthly[m]?i.monthly[m].amt:0),s),0):0;
  const growthRate=prevTotal>0?((selTotal-prevTotal)/prevTotal*100):0;
  const hasGrowth=prevMs.length>0&&prevTotal>0;

  // 평균 단가
  const avgPrice=selQty>0?selTotal/selQty:0;
  // 카테고리별 평균단가 (키오스크/포스/TO/출입인증기)
  const sCatAvgP=(cat)=>{
    const its=D.isd.filter(i=>i.sku_id.startsWith('C-')&&i.sku_id.substring(2,4)===cat);
    let tQ=0,tA=0;
    its.forEach(i=>{selMs.forEach(m=>{if(i.monthly[m]){tQ+=i.monthly[m].qty||0;tA+=i.monthly[m].amt||0}})});
    return{qty:tQ,amt:tA,avg:tQ>0?tA/tQ:0};
  };
  const sKiP=sCatAvgP('KI'),sPoP=sCatAvgP('PO'),sToP=sCatAvgP('TO'),sScP=sCatAvgP('SC');

  // 대분류별 매출 집계 (sales)
  const catMap={...C_CATS,...B_CATS};
  const salesByCat={};
  D.isd.forEach(i=>{
    const cat=getSkuCat(i.sku_id);const catNm=catMap[cat]||cat;
    if(!salesByCat[cat]) salesByCat[cat]={cat,catNm,qty:0,amt:0,monthly:{},items:0};
    salesByCat[cat].items++;
    selMs.forEach(m=>{
      const d=i.monthly[m];
      if(d){
        salesByCat[cat].qty+=(d.qty||0);
        salesByCat[cat].amt+=(d.amt||0);
        if(!salesByCat[cat].monthly[m]) salesByCat[cat].monthly[m]={qty:0,amt:0};
        salesByCat[cat].monthly[m].qty+=(d.qty||0);
        salesByCat[cat].monthly[m].amt+=(d.amt||0);
      }
    });
  });
  const catList=Object.values(salesByCat).filter(c=>c.amt>0).sort((a,b)=>b.amt-a.amt);

  const isAmt=S.salesView==='amt';
  return`<div class="kpi-sticky"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-size:18px">판매 분석</h2>${periodBar()}</div>
  ${noDataNotice()}
  <div class="kr">
    <div class="kc"><div class="lb">${mLabel} 매출</div><div class="vl c-gn">${fmtM(selTotal)}</div><div class="sb">${fmt(selQty)}개 / ${selItemCnt}품목</div></div>
    <div class="kc"><div class="lb">제품(C)</div><div class="vl c-bl">${fmtM(cSelTotal)}</div><div class="sb">${fmt(cSelQty)}개 / ${pct(cSelTotal,selTotal)}%</div></div>
    <div class="kc"><div class="lb">원재료(B)</div><div class="vl c-cy">${fmtM(bSelTotal)}</div><div class="sb">${fmt(bSelQty)}개 / ${pct(bSelTotal,selTotal)}%</div></div>
    <div class="kc"><div class="lb">키오스크 평균단가</div><div class="vl c-bl">${fmtM(sKiP.avg)}</div><div class="sb">${fmt(sKiP.qty)}대 / ${fmtM(sKiP.amt)}</div></div>
    <div class="kc"><div class="lb">포스/TO/출입인증기</div><div class="vl" style="font-size:13px">${fmtM(sPoP.avg)} / ${fmtM(sToP.avg)} / ${fmtM(sScP.avg)}</div><div class="sb">포스 ${fmt(sPoP.qty)} / TO ${fmt(sToP.qty)} / 출입 ${fmt(sScP.qty)}대</div></div>
    ${hasGrowth?`<div class="kc"><div class="lb">전기대비 증감</div><div class="vl ${growthRate>=0?'c-gn':'c-rd'}">${growthRate>=0?'+':''}${growthRate.toFixed(1)}%</div><div class="sb">vs ${prevMs.map(m=>m.slice(5)+'월').join(',')}</div></div>`

// ═══════════════ SUPPLIERS ═══════════════
function pgSupp(){
  const selMs=getSelectedMonths();
  const mLabel=periodLabel();
  // 선택 기간 기준 KPI
  let selAmt=0,selCnt=0;
  D.vdd.forEach(v=>{selMs.forEach(m=>{const md=v.monthly[m];if(md){selAmt+=md.amt||0;selCnt+=md.cnt||0}})});
  // 발주 데이터로 추가 KPI 계산
  let relPOs=D.po.filter(p=>p.vendor!=='nan'&&p.item_name!=='nan');
  if(S.selMonth!=='all'){
    const selSet=new Set(selMs.map(m=>m.replace('-','/')));
    relPOs=relPOs.filter(p=>{const pm=p.date_no.substring(0,7).replace('-','/');return selSet.has(pm)});
  }
  const avgOrderAmt=relPOs.length>0?relPOs.reduce((s,p)=>s+p.amount,0)/relPOs.length:0;
  const leads=relPOs.map(p=>calcLeadDays(p.date_no.split(' ')[0],p.due_date.trim())).filter(v=>v!=null&&!isNaN(v));
  const avgLead=leads.length>0?Math.round(leads.reduce((s,v)=>s+v,0)/leads.length):0;
  const compCnt=relPOs.filter(p=>p.status==='완료').length;
  const compRate=relPOs.length>0?(compCnt/relPOs.length*100).toFixed(0):0;
  const activeVendors=S.selMonth==='all'?D.vdd.length:[...new Set(relPOs.map(p=>p.vendor))].length;
  // 전기대비
  let prevMs=[];
  if(selMs.length===1){
    const allMs=[...M25,...M26];const idx=allMs.indexOf(selMs[0]);
    if(idx>0) prevMs=[allMs[idx-1]];
  } else if(S.selMonth!=='all'&&S.selMonth.startsWith('Q')){
    const qMap={Q1:'Q4',Q2:'Q1',Q3:'Q2',Q4:'Q3'};
    const prevQ=qMap[S.selMonth];const prevYr=S.selMonth==='Q1'?String(+S.selYear-1):S.selYear;
    prevMs=getQuarterMonths(prevQ,prevYr);
  }
  let prevAmt=0;
  if(prevMs.length>0) D.vdd.forEach(v=>{prevMs.forEach(m=>{const md=v.monthly[m];if(md)prevAmt+=md.amt||0})});
  const suppGrowth=prevAmt>0?((selAmt-prevAmt)/prevAmt*100):0;
  const hasSuppGrowth=prevMs.length>0&&prevAmt>0;

  return`<div class="kpi-sticky"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-size:18px">공급사 관리</h2>${periodBar()}</div>
  ${noDataNotice()}
  <div class="kr">
    <div class="kc"><div class="lb">${S.selMonth==='all'?'등록':'활동'} 공급사</div><div class="vl c-bl">${activeVendors}개사</div></div>
    <div class="kc"><div class="lb">${mLabel} 발주액</div><div class="vl c-gn">${fmtM(selAmt)}</div><div class="sb">${selCnt}건</div></div>
    <div class="kc"><div class="lb">최대 발주 거래처</div><div class="vl" style="font-size:14px">${(()=>{const vt={};relPOs.forEach(p=>{vt[p.vendor]=(vt[p.vendor]||0)+p.amount});const top=Object.entries(vt).sort((a,b)=>b[1]-a[1])[0];return top?(top[0].length>10?top[0].slice(0,10)+'..':top[0]):'–'})()}</div><div class="sb">${(()=>{const vt={};relPOs.forEach(p=>{vt[p.vendor]=(vt[p.vendor]||0)+p.amount});const top=Object.entries(vt).sort((a,b)=>b[1]-a[1])[0];return top?fmtM(top[1]):'–'})()}</div></div>
    <div class="kc"><div class="lb">TOP 발주 품목</div><div class="vl" style="font-size:14px">${(()=>{const it={};relPOs.forEach(p=>{it[p.item_name]=(it[p.item_name]||0)+p.amount});const top=Object.entries(it).sort((a,b)=>b[1]-a[1])[0];return top?(top[0].length>12?top[0].slice(0,12)+'..':top[0]):'–'})()}</div><div class="sb">${(()=>{const it={};relPOs.forEach(p=>{it[p.item_name]=(it[p.item_name]||0)+p.amount});const top=Object.entries(it).sort((a,b)=>b[1]-a[1])[0];return top?fmtM(top[1]):'–'})()}</div></div>
    <div class="kc"><div class="lb">납기완료율</div><div class="vl ${compRate>=80?'c-gn':compRate>=50?'c-yl':'c-rd'}">${compRate}%</div><div class="sb">${compCnt}/${relPOs.length}건</div></div>
    ${hasSuppGrowth?(()=>{
      const prevLabel=prevMs.length===1?prevMs[0].slice(5)+'월':'전기';
      const curLabel=selMs.length===1?selMs[0].slice(5)+'월':mLabel;
      return'<div class="kc"><div class="lb">발주액 전기대비</div><div class="vl '+(suppGrowth>=0?'c-gn':'c-rd')+'">'+(suppGrowth>=0?'+':'')+suppGrowth.toFixed(1)+'%</div><div class="sb">'+prevLabel+' '+fmtM(prevAmt)+' → '+curLabel+' '+fmtM(selAmt)+'</div></div>'})():''}
  </div></div>
  <div class="pn" style="margin-bottom:16px"><div class="pt">공급사별 월별 발주 추이</div><div class="cc" style="height:300px"><canvas id="cSuppTrend" aria-label="공급사별 월별 발주 추이 차트" role="img"></canvas></div></div>
  <div class="tb">
    <div class="btn-group">
      <div class="btn ${S.vendorView==='score'?'active':''}" onclick="S.vendorView='score';render()">발주 현황</div>
      <div class="btn ${S.vendorView==='detail'?'active':''}" onclick="S.vendorView='detail';render()">취급 품목</div>
      <div class="btn ${S.vendorView==='monthly'?'active':''}" onclick="S.vendorView='monthly';render()">월별 현황</div>
    </div>

// ═══════════════ FORECAST ═══════════════

    ${ms25.length>0&&ms26.length>0?`<div class="kc"><div class="lb">전년 대비(YoY)</div><div class="vl ${yoyGrowth>=0?'c-gn':'c-rd'}">${yoyGrowth>=0?'+':''}${yoyGrowth.toFixed(1)}%</div><div class="sb">월평균 기준</div></div>`:''}

  </div></div>
  <div class="pn"><div class="pt">매출 실적 vs 예측 (2025~2026)</div><div class="cc"><canvas id="cFcast" aria-label="매출 실적 대비 예측 차트" role="img"></canvas></div></div>

        <th class="tr" style="color:var(--tx2)">25년합계</th>

        return list.map(i=>{

    <p style="font-size:11px;color:var(--tx2);margin-bottom:10px">현재고 보유 중이나 2026년 1~3월 판매/출고 이력 없는 품목 (BOM 수요 포함 검토)</p>

        <th class="tr" style="color:var(--tx2)">25년판매</th><th class="tr" style="color:var(--ac2)">26년출고</th><th class="tr" style="color:var(--pp)">타계정출고</th><th class="tr" style="color:var(--yl)">BOM수요</th><th>판정</th></tr></thead>

        const sold26=new Set(D.isd.map(i=>i.sku_id));

// ═══════════════ 타계정 내역 (계정별 월별 수치 포함) ═══════════════
function pgOtherAcct(){
  const taAll=D.ta||[];
  const taSum=D.ta_sum||[];
  const yr=S.selYear;

  // 연도 필터
  const ta=taAll.filter(t=>(t.d||'').startsWith(yr));
  const totalAmt=ta.reduce((s,t)=>s+(t.a||0),0);
  const totalQty=ta.reduce((s,t)=>s+(t.q||0),0);

  let filtered=ta;
  if(S.selMonth!=='all') filtered=filtered.filter(t=>(t.d||'').substring(5,7)===S.selMonth);
  if(S.fType!=='all')filtered=filtered.filter(t=>t.ac===S.fType);
  if(S.search){const q=S.search.toLowerCase();filtered=filtered.filter(t=>(t.nm||'').toLowerCase().includes(q)||(t.sk||'').toLowerCase().includes(q)||(t.loc||'').toLowerCase().includes(q)||(t.dt||'').toLowerCase().includes(q))}

  // 월별 총합 (해당 연도)
  const mSum={};
  ta.forEach(t=>{
    const m=(t.d||'').substring(5,7);
    if(!m)return;
    if(!mSum[m])mSum[m]={qty:0,amt:0};
    mSum[m].qty+=t.q||0;mSum[m].amt+=t.a||0;
  });

  // 계정별 월별 집계 (해당 연도)
  const acctMonthly={};
  ta.forEach(t=>{
    const ac=t.ac||'(미분류)';
    const m=(t.d||'').substring(5,7);
    if(!m)return;
    if(!acctMonthly[ac])acctMonthly[ac]={};
    if(!acctMonthly[ac][m])acctMonthly[ac][m]={qty:0,amt:0};
    acctMonthly[ac][m].qty+=t.q||0;
    acctMonthly[ac][m].amt+=t.a||0;
  });

  // 연도별 계정 합계 재계산
  const yrAcctSum={};
  ta.forEach(t=>{const ac=t.ac||'(미분류)';if(!yrAcctSum[ac])yrAcctSum[ac]={ac,qty:0,amt:0};yrAcctSum[ac].qty+=t.q||0;yrAcctSum[ac].amt+=t.a||0});
  const yrTaSum=Object.values(yrAcctSum).sort((a,b)=>b.amt-a.amt);

  const allMonths=['01','02','03','04','05','06','07','08','09','10','11','12'];
  const dataMonths=yr==='2026'?M26_DATA.map(m=>m.slice(5)):allMonths;

  const filteredAmt=filtered.reduce((s,t)=>s+(t.a||0),0);
  const filteredQty=filtered.reduce((s,t)=>s+(t.q||0),0);

  return`<div class="kpi-sticky"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-size:18px">타계정 내역</h2>${periodBar()}</div>
  ${noDataNotice()}
  <div class="kr">
    <div class="kc"><div class="lb">${S.selMonth==='all'?'연간':''+parseInt(S.selMonth)+'월'} 건수</div><div class="vl c-bl">${fmt(filteredQty)}건</div><div class="sb">${filtered.length}행</div></div>
    <div class="kc"><div class="lb">${S.selMonth==='all'?'연간':''+parseInt(S.selMonth)+'월'} 금액</div><div class="vl c-rd">${fmtM(filteredAmt)}</div></div>

        const showMs=M26_DATA;
        const _isdMap={};(D.isd||[]).forEach(x=>{if(x.sku_id)_isdMap[x.sku_id]=x.monthly||{}});
        const parentData=bomParents.map(bp=>{
          const isdM=_isdMap[bp.parent_sku]||{};
          const monthQty={};
          let totalQ=0;
          showMs.forEach(m=>{const iq=(isdM[m]&&isdM[m].qty)||0;const pm=mio[bp.parent_sku]&&mio[bp.parent_sku][m];const pureOut=pm?Math.max(0,(pm.oq||0)-(pm.ot||0)):0;const mq=Math.max(iq,pureOut);monthQty[m]=mq*bp.qty;totalQ+=mq*bp.qty});
          return{sku:bp.parent_sku,name:bp.parent_name||bp.parent_sku,bomQty:bp.qty,monthQty,totalQ};
        }).filter(p=>p.totalQ>0).sort((a,b)=>b.totalQ-a.totalQ);
        const totalConsumed=parentData.reduce((s,p)=>s+p.totalQ,0);
        return'<div style="font-weight:600;margin-bottom:8px;color:var(--pp)">완제품 소비 현황 (BOM 역추적) <span class="badge">'+parentData.length+'종</span></div>'
          +(parentData.length>0?'<div class="st" style="max-height:400px"><table><thead><tr><th>#</th><th>완제품 (C-)</th><th class="tr">BOM소요</th>'+showMs.map(m=>'<th class="tr">'+m.slice(5)+'월</th>').join('')+'<th class="tr" style="font-weight:700">소비합계</th><th class="tr">비중</th></tr></thead><tbody>'
          +parentData.map((p,i)=>'<tr class="clickable" onclick="openBomDetail(\''+p.sku+'\')"><td style="color:var(--tx2);font-size:10px">'+(i+1)+'</td><td><span style="font-family:monospace;font-size:10px;color:var(--ac);margin-right:4px">'+p.sku+'</span>'+p.name+'</td><td class="tr">'+p.bomQty+'</td>'+showMs.map(m=>'<td class="tr">'+(p.monthQty[m]>0?fmt(p.monthQty[m]):'-')+'</td>').join('')+'<td class="tr" style="font-weight:600">'+fmt(p.totalQ)+'</td><td class="tr">'+(totalConsumed>0?(p.totalQ/totalConsumed*100).toFixed(1):'0')+'%</td></tr>').join('')
          +'<tr style="font-weight:700;border-top:2px solid var(--bd)"><td colspan="3">합계</td>'+showMs.map(m=>'<td class="tr">'+fmt(parentData.reduce((s,p)=>s+(p.monthQty[m]||0),0))+'</td>').join('')+'<td class="tr">'+fmt(totalConsumed)+'</td><td class="tr">100%</td></tr></tbody></table></div>'
          :'<div style="color:var(--tx2);font-size:12px;padding:16px;text-align:center">이 자재를 사용하는 완제품 판매 이력이 없습니다.</div>')
          +'<div style="font-size:10px;color:var(--tx2);margin-top:6px">* max(판매현황, 수불부순수출고) × BOM 소요량으로 역산 (구독렌탈 포함) | 행 클릭 시 BOM 상세</div>';
      }
      const csi=D.csi||[];
      const allMs=[...M25,...M26_DATA];
      const custAgg={};
      csi.filter(x=>x.ic===d.sku_id).forEach(cr=>{
        const cName=cr.c;
        if(!custAgg[cName])custAgg[cName]={name:cName,qty:0,amt:0,months:{}};
        allMs.forEach(m=>{
          if(cr.ml[m]&&cr.ml[m].q>0){
            custAgg[cName].qty+=cr.ml[m].q;
            custAgg[cName].amt+=cr.ml[m].a;
            if(!custAgg[cName].months[m])custAgg[cName].months[m]={q:0,a:0};
            custAgg[cName].months[m].q+=cr.ml[m].q;
            custAgg[cName].months[m].a+=cr.ml[m].a;
          }
        });
      });
      const custList=Object.values(custAgg).filter(c=>c.qty>0).sort((a,b)=>b.amt-a.amt);
      const totalOutQty=custList.reduce((s,c)=>s+c.qty,0);
      const totalOutAmt=custList.reduce((s,c)=>s+c.amt,0);
      const showMs=M26_DATA;
      return'<div style="font-weight:600;margin-bottom:8px;color:var(--pp)">출고 거래처 현황 ('+custList.length+'개 거래처)</div>'
        +(custList.length>0?'<div class="st" style="max-height:400px"><table><thead><tr><th>#</th><th>거래처</th>'+showMs.map(m=>'<th class="tr">'+m.slice(5)+'월</th>').join('')+'<th class="tr" style="font-weight:700">합계(수량)</th><th class="tr">합계(금액)</th><th class="tr">비중</th></tr></thead><tbody>'+custList.map((c,i)=>{const cn=c.name.replace(/'/g,"&#39;");return'<tr class="clickable" onclick="_pushModal();S.modal=\'custDetail\';S.modalData=\''+cn+'\';render()"><td style="color:var(--tx2);font-size:10px">'+(i+1)+'</td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+c.name+'">'+c.name+'</td>'+showMs.map(m=>'<td class="tr">'+(c.months[m]?fmt(c.months[m].q):'-')+'</td>').join('')+'<td class="tr" style="font-weight:600">'+fmt(c.qty)+'</td><td class="tr">'+fmtM(c.amt)+'</td><td class="tr">'+(totalOutAmt>0?(c.amt/totalOutAmt*100).toFixed(1):'0')+'%</td></tr>'}).join('')+'<tr style="font-weight:700;border-top:2px solid var(--bd)"><td colspan="2">합계</td>'+showMs.map(m=>'<td class="tr">'+fmt(custList.reduce((s,c)=>s+(c.months[m]?c.months[m].q:0),0))+'</td>').join('')+'<td class="tr">'+fmt(totalOutQty)+'</td><td class="tr">'+fmtM(totalOutAmt)+'</td><td class="tr">100%</td></tr></tbody></table></div>'
        :'<div style="color:var(--tx2);font-size:12px;padding:16px;text-align:center">출고 거래처 이력이 없습니다.</div>')
        +'<div style="font-size:10px;color:var(--tx2);margin-top:6px">* 판매현황 데이터 기준 | 행 클릭 시 거래처 상세</div>';
    })()}
    `:S.modalTab===2?`
    <div style="font-weight:600;margin-bottom:8px;color:var(--ac)">매입 이력 (2026.1~3)</div>
    ${hist.purchases.length>0?`<div class="st" style="max-height:350px"><table>
      <thead><tr><th>일자</th><th>공급사</th><th class="tr">수량</th><th class="tr">단가</th><th class="tr">금액</th></tr></thead>
      <tbody>${hist.purchases.map(p=>`<tr><td>${p.date}</td><td>${p.vendor}</td>
        <td class="tr">${fmt(p.qty)}</td><td class="tr">${fmt(p.price)}</td><td class="tr">${fmtM(p.amount)}</td></tr>`).join('')}</tbody></table></div>`:'<div style="color:var(--tx2);font-size:12px">매입 이력 없음</div>'}
    `:`
    ${(()=>{
      const isB2=d.sku_id.startsWith('B-');
      if(isB2){
        // B-자재: BOM을 통한 월별 생산소비 추이
        const bomParents2=D.bom.filter(b=>b.child_sku===d.sku_id);
        const _isdMap2={};(D.isd||[]).forEach(x=>{if(x.sku_id)_isdMap2[x.sku_id]=x.monthly||{}});
        const allShowMs=[...M25,...M26_DATA];
        const monthlyConsume=allShowMs.map(m=>{
          let total=0;
          bomParents2.forEach(bp=>{
            const isdM=_isdMap2[bp.parent_sku]||{};
            const iq=(isdM[m]&&isdM[m].qty)||0;
            const pm=mio[bp.parent_sku]&&mio[bp.parent_sku][m];
            const pureOut=pm?Math.max(0,(pm.oq||0)-(pm.ot||0)):0;
            const mq=Math.max(iq,pureOut);
            total+=mq*bp.qty;
          });
          const md=(mio[d.sku_id]&&mio[d.sku_id][m])||{};
          const mioOut=md.oq||0;
          const mioOt=md.ot||0;
          return{m,consume:total,mioOut,mioOt};
        });
        const totalConsume=monthlyConsume.reduce((s,x)=>s+x.consume,0);
        const totalMioOut=monthlyConsume.reduce((s,x)=>s+x.mioOut,0);
        const totalOt=monthlyConsume.reduce((s,x)=>s+x.mioOt,0);
        return'<div style="font-weight:600;margin-bottom:8px;color:var(--pp)">생산 소비 추이 (BOM 역추적) <span class="badge">'+bomParents2.length+'종 완제품</span></div>'
          +'<div class="st" style="max-height:350px"><table><thead><tr><th>월</th><th class="tr" style="color:var(--pp)">수불부 출고</th><th class="tr" style="color:#8b5cf6">타계정출고</th><th class="tr" style="color:var(--ac)">BOM 소비(추정)</th><th class="tr">차이</th><th class="tr" style="color:var(--tx2)">보정차이</th></tr></thead><tbody>'
          +monthlyConsume.filter(x=>x.consume>0||x.mioOut>0).map(x=>{
            const diff=x.mioOut-x.consume;
            const adjDiff=x.mioOut-x.mioOt-x.consume;
            return'<tr><td>'+x.m.slice(2,4)+'.'+x.m.slice(5)+'</td><td class="tr" style="color:var(--pp)">'+fmt(x.mioOut)+'</td><td class="tr" style="color:#8b5cf6">'+(x.mioOt>0?fmt(x.mioOt):'-')+'</td><td class="tr" style="color:var(--ac)">'+fmt(x.consume)+'</td><td class="tr" style="color:'+(Math.abs(diff)>5?'var(--rd)':'var(--tx2)')+'">'+((diff>0?'+':'')+fmt(diff))+'</td><td class="tr" style="color:'+(Math.abs(adjDiff)>5?'var(--yl)':'var(--tx2)')+'">'+((adjDiff>0?'+':'')+fmt(adjDiff))+'</td></tr>'
          }).join('')
          +'<tr style="font-weight:700;border-top:2px solid var(--bd)"><td>합계</td><td class="tr" style="color:var(--pp)">'+fmt(totalMioOut)+'</td><td class="tr" style="color:#8b5cf6">'+(totalOt>0?fmt(totalOt):'-')+'</td><td class="tr" style="color:var(--ac)">'+fmt(totalConsume)+'</td><td class="tr" style="color:'+(Math.abs(totalMioOut-totalConsume)>10?'var(--rd)':'var(--tx2)')+'">'+((totalMioOut-totalConsume>0?'+':'')+fmt(totalMioOut-totalConsume))+'</td><td class="tr" style="color:'+(Math.abs(totalMioOut-totalOt-totalConsume)>10?'var(--yl)':'var(--tx2)')+'">'+((totalMioOut-totalOt-totalConsume>0?'+':'')+fmt(totalMioOut-totalOt-totalConsume))+'</td></tr>'
          +'</tbody></table></div>'
          +'<div style="font-size:10px;color:var(--tx2);margin-top:6px">* BOM 소비 = max(판매현황, 수불부순수출고) × BOM 소요량 역산 (구독렌탈 포함) | 차이 = 수불부출고 − BOM소비 | <strong>보정차이</strong> = 출고 − 타계정 − BOM소비</div>';
      }
      return'<div style="font-weight:600;margin-bottom:8px;color:var(--pp)">생산 이력 (2026.1~3)</div>'
        +(hist.production.length>0?'<div class="st" style="max-height:350px"><table><thead><tr><th>기간</th><th class="tr">생산수량</th></tr></thead><tbody>'+hist.production.map(p=>'<tr><td>'+p.date+'</td><td class="tr">'+fmt(p.qty)+'</td></tr>').join('')+'</tbody></table></div>':'<div style="color:var(--tx2);font-size:12px">생산 이력 없음</div>');
    })()}
    `}
  </div></div>`;
}

function renderIODetailModal(){
  const dd=S.modalData;if(!dd)return'';
  const {sku,month,type}=dd;
  const inv=D.inv.find(i=>i.sku_id===sku);
  const itemName=inv?inv.item_name:sku;
  const io=mio[sku]||{};
  const mData=io[month]||{};
  const yr=month.substring(0,4);
  const typeNames={iq:'입고',on:'정상출고',ot:'타계정 대체'};
  const typeColors={iq:'var(--gn)',on:'var(--pp)',ot:'var(--or)'};
  const val=mData[type]||0;

  // 입고 상세: 구매 전표 매칭
  let detailHtml='';
  if(type==='iq'){
    const purchSrc=yr==='2025'?(D.purch25||[]):(D.purch26||[]);
    const monthRecords=purchSrc.filter(r=>r.sku_id===sku&&r.date.substring(0,7).replace('/','-')===month);
    if(monthRecords.length>0){
      const tQty=monthRecords.reduce((s,r)=>s+r.qty,0);
      const tAmt=monthRecords.reduce((s,r)=>s+r.amount,0);
      detailHtml=`<div style="font-weight:600;margin-bottom:8px;color:var(--gn)">구매 전표 상세 (${monthRecords.length}건)</div>
        <div class="st" style="max-height:300px"><table>
        <thead><tr><th>일자</th><th>공급사</th><th class="tr">수량</th><th class="tr">단가</th><th class="tr">금액</th></tr></thead>
        <tbody>${monthRecords.map(r=>`<tr><td style="white-space:nowrap">${r.date}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.vendor}</td>
          <td class="tr">${fmt(r.qty)}</td><td class="tr">${fmt(r.price)}</td><td class="tr">${fmtM(r.amount)}</td></tr>`).join('')}
        <tr style="font-weight:700;border-top:2px solid var(--bd)"><td colspan="2">합계</td>
          <td class="tr">${fmt(tQty)}</td><td></td><td class="tr">${fmtM(tAmt)}</td></tr></tbody></table></div>
        ${tQty!==val?`<div style="margin-top:8px;padding:8px;background:rgba(234,179,8,.08);border:1px solid var(--yl);border-radius:6px;font-size:11px">
          <strong style="color:var(--yl)">참고:</strong> 수불부 입고수량(${fmt(val)}) ≠ 구매전표 합계(${fmt(tQty)}). 생산입고·대체입고 등이 포함될 수 있습니다.</div>`:''}`;
    } else {
      // 구매전표 없으면 생산 이력 확인
      const hist=D.hist[sku]||{production:[]};
      const prodRecords=hist.production.filter(p=>{const pm=p.date?p.date.substring(0,7).replace('/','-'):'';return pm===month});
      if(prodRecords.length>0){
        detailHtml=`<div style="font-weight:600;margin-bottom:8px;color:var(--pp)">생산 입고 이력</div>
          <div class="st"><table><thead><tr><th>기간</th><th class="tr">생산수량</th></tr></thead>
          <tbody>${prodRecords.map(p=>`<tr><td>${p.date}</td><td class="tr">${fmt(p.qty)}</td></tr>`).join('')}</tbody></table></div>`;
      } else {
        detailHtml=`<div style="color:var(--tx2);font-size:12px;padding:16px;text-align:center">해당 월 구매 전표 또는 생산 이력이 없습니다.<br><span style="font-size:11px">수불부 집계 기준 입고: ${fmt(val)}개</span></div>`;
      }
    }
  } else if(type==='on'){
    // 정상출고: 거래처별 판매 내역 (D.csi)
    const csi=D.csi||[];
    const custRows=csi.filter(x=>x.ic===sku&&x.ml[month]&&x.ml[month].q>0);
    if(custRows.length>0){
      const rows=custRows.map(cr=>({name:cr.c,qty:cr.ml[month].q,amt:cr.ml[month].a})).sort((a,b)=>b.amt-a.amt);
      const tQty=rows.reduce((s,r)=>s+r.qty,0);
      const tAmt=rows.reduce((s,r)=>s+r.amt,0);
      detailHtml=`<div style="font-weight:600;margin-bottom:8px;color:var(--pp)">거래처별 출고 내역 (${rows.length}개 거래처)</div>
        <div class="st" style="max-height:300px"><table>
        <thead><tr><th>#</th><th>거래처</th><th class="tr">수량</th><th class="tr">금액</th><th class="tr">비중</th></tr></thead>
        <tbody>${rows.map((r,i)=>`<tr><td style="color:var(--tx2);font-size:10px">${i+1}</td>
          <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</td>
          <td class="tr">${fmt(r.qty)}</td><td class="tr">${fmtM(r.amt)}</td>
          <td class="tr">${tAmt>0?(r.amt/tAmt*100).toFixed(1):'0'}%</td></tr>`).join('')}
        <tr style="font-weight:700;border-top:2px solid var(--bd)"><td colspan="2">합계</td>
          <td class="tr">${fmt(tQty)}</td><td class="tr">${fmtM(tAmt)}</td><td class="tr">100%</td></tr></tbody></table></div>
        ${tQty!==val?`<div style="margin-top:8px;padding:8px;background:rgba(234,179,8,.08);border:1px solid var(--yl);border-radius:6px;font-size:11px">
          <strong style="color:var(--yl)">참고:</strong> 수불부 정상출고(${fmt(val)}) ≠ 판매현황 합계(${fmt(tQty)}). 데이터 소스 차이가 있을 수 있습니다.</div>`:''}`;
    } else {
      detailHtml=`<div style="color:var(--tx2);font-size:12px;padding:16px;text-align:center">해당 월 거래처별 판매 이력이 없습니다.<br><span style="font-size:11px">수불부 집계 기준 정상출고: ${fmt(val)}개</span></div>`;
    }
  } else if(type==='ot'){
    // 타계정 대체 — 상세 전표 없음, 요약 정보 제공
    const direction=val>0?'출고 (타계정 대체 출고)':val<0?'입고 (타계정 대체 입고)':'없음';
    const dirColor=val>0?'var(--or)':val<0?'var(--gn)':'var(--tx2)';
    // 전체 기간 타계정 추이
    const allMonths=[...M25,...M26_DATA];
    const otVals=allMonths.map(m=>({m,v:io[m]?io[m].ot||0:0})).filter(x=>x.v!==0);
    detailHtml=`<div style="padding:16px;background:var(--sf2);border-radius:8px;margin-bottom:12px">
      <div style="font-size:13px;margin-bottom:8px"><strong>타계정 대체</strong>란?</div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.6">
        정상적인 매출/구매가 아닌 계정 간 대체 이동입니다.<br>
        양수(+) = 타계정으로 출고 | 음수(−) = 타계정에서 입고
      </div></div>
      <div style="margin-bottom:12px">
        <div style="font-size:14px;font-weight:600;color:${dirColor}">${month.slice(5)}월 타계정: ${fmt(val)}개 → ${direction}</div>
      </div>
      ${otVals.length>0?`<div style="font-weight:600;margin-bottom:8px;color:var(--or)">타계정 이력 (전체 기간)</div>
        <div class="st" style="max-height:250px"><table>
        <thead><tr><th>월</th><th class="tr">수량</th><th>구분</th></tr></thead>
        <tbody>${otVals.map(x=>`<tr${x.m===month?' style="background:rgba(249,115,22,.1)"':''}>
          <td>${x.m}</td><td class="tr" style="color:${x.v>0?'var(--or)':'var(--gn)'};font-weight:${x.m===month?'700':'400'}">${fmt(x.v)}</td>
          <td>${x.v>0?'<span class="tg tg-p">출고</span>':'<span class="tg tg-g">입고</span>'}</td></tr>`).join('')}</tbody></table></div>`
      :'<div style="color:var(--tx2);font-size:12px">타계정 이력이 없습니다.</div>'}`;
  }

  return`<div class="modal-overlay" onclick="if(event.target===this){_closeAllModals()}">
  <div class="modal" role="dialog" aria-modal="true" tabindex="-1" style="max-width:700px">
    <button class="close" aria-label="닫기" onclick="_closeAllModals()">✕</button>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      ${S.modalHistory.length>0?'<div class="btn" onclick="goBackModal()" style="font-size:11px;padding:2px 10px">← 뒤로</div>':''}
      <h3 style="margin:0;color:${typeColors[type]||'inherit'}">${typeNames[type]||type} 상세</h3>
    </div>
    <div style="font-size:11px;color:var(--tx2);margin-bottom:16px">${sku} · ${itemName} | <strong style="color:${typeColors[type]}">${month} ${typeNames[type]}: ${fmt(val)}개</strong></div>
    ${detailHtml}
  </div></div>`;
}

function renderVendorModal(){
  const name=S.modalData;if(!name)return'';
  const v=D.vdd.find(x=>x.name===name);if(!v)return'';
  const pos=D.po.filter(p=>p.vendor===name);
  return`<div class="modal-overlay" onclick="if(event.target===this){_closeAllModals()}">
  <div class="modal" role="dialog" aria-modal="true" tabindex="-1">

function renderCustDetailModal(){
  const custName=S.modalData;if(!custName)return'';
  const cust=D.csd.find(c=>c.name===custName);if(!cust)return'';
  const selMs=getSelectedMonths();
  const mLabel=periodLabel();
  const pAmt=selMs.reduce((s,m)=>s+(cust.monthly[m]?cust.monthly[m].amt:0),0);
  const pQty=selMs.reduce((s,m)=>s+(cust.monthly[m]?cust.monthly[m].qty:0),0);
  // 전체 매출 대비 비중
  const totalAll=D.csd.reduce((s,c)=>selMs.reduce((ss,m)=>ss+(c.monthly[m]?c.monthly[m].amt:0),s),0);
  // 월별 추이
  const allMs=[...M25,...M26];
  const monthlyTrend=allMs.map(m=>({m,amt:cust.monthly[m]?cust.monthly[m].amt:0,qty:cust.monthly[m]?cust.monthly[m].qty:0})).filter(d=>d.amt>0||d.qty>0);
  // 순위
  const ranked=D.csd.map(c=>({name:c.name,total:selMs.reduce((s,m)=>s+(c.monthly[m]?c.monthly[m].amt:0),0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const rank=ranked.findIndex(c=>c.name===custName)+1;
  return'<div class="modal-overlay" onclick="if(event.target===this){_closeAllModals()}"><div class="modal" role="dialog" aria-modal="true" tabindex="-1" style="max-width:800px"><button class="close" aria-label="닫기" onclick="_closeAllModals()">✕</button>'
  +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+(S.modalHistory.length>0?'<div class="btn" onclick="goBackModal()" style="font-size:11px;padding:2px 10px">← 뒤로</div>':'')+'<h3 style="margin:0">'+custName+'</h3></div>'

  +'<div class="kr" style="margin-bottom:16px">'
  +'<div class="kc"><div class="lb">매출 순위</div><div class="vl c-bl">#'+rank+'</div><div class="sb">/ '+ranked.length+'개사</div></div>'
  +'<div class="kc"><div class="lb">'+mLabel+' 매출</div><div class="vl c-gn">'+fmtM(pAmt)+'</div><div class="sb">'+fmt(pQty)+'개</div></div>'

function renderSkuCalcModal(){
  const sku=S.modalData;if(!sku)return'';
  const inv=D.inv.find(i=>i.sku_id===sku);if(!inv)return'';
  const t=getSkuType(sku);
  const io=mio[sku]||{};
  const last6=DATA_MONTHS.slice(-6);
  const isC=sku.startsWith('C-');
  const isdItem=isC?D.isd.find(x=>x.sku_id===sku):null;
  // Compute step by step
  let firstIdx=-1,activeMs=[],useMs=[],monthVals=[];
  if(isC&&isdItem){
    firstIdx=DATA_MONTHS.findIndex(m=>isdItem.monthly[m]&&isdItem.monthly[m].qty>0);
    activeMs=firstIdx>=0?DATA_MONTHS.slice(firstIdx):last6;
    useMs=activeMs.length<=6?activeMs:last6;
    monthVals=useMs.map(m=>({m,v:isdItem.monthly[m]?isdItem.monthly[m].qty:0}));
  } else {
    firstIdx=DATA_MONTHS.findIndex(m=>io[m]&&(io[m].iq>0||io[m].on>0));
    activeMs=firstIdx>=0?DATA_MONTHS.slice(firstIdx):last6;
    useMs=activeMs.length<=6?activeMs:last6;
    monthVals=useMs.map(m=>({m,v:io[m]?io[m].on||0:0}));
  }
  const totalOut=monthVals.reduce((s,x)=>s+x.v,0);
  const avgOut=useMs.length>0?totalOut/useMs.length:0;
  const qty=inv.qty;
  const holdMonths=avgOut>0?(qty/avgOut):Infinity;
  const isExc=avgOut>0&&holdMonths>6;
  const isND=last6.every(m=>{
    if(isC&&isdItem) return!isdItem.monthly[m]||isdItem.monthly[m].qty===0;
    return!io[m]||((io[m].on||0)===0);
  });
  const firstMonth=firstIdx>=0?DATA_MONTHS[firstIdx]:'없음';

  return'<div class="modal-overlay" onclick="if(event.target===this){_closeAllModals()}"><div class="modal" role="dialog" aria-modal="true" tabindex="-1" style="max-width:700px">'
  +'<button class="close" aria-label="닫기" onclick="_closeAllModals()">✕</button>'
  +'<h3><span class="tg '+(t.includes('C')?'tg-b':'tg-c')+'" style="margin-right:8px">'+(t.includes('C')?'C':'B')+'</span>'+inv.item_name+'</h3>'
  +'<div style="font-size:11px;color:var(--tx2);margin-bottom:16px">코드: '+sku+' | 현재고: <strong style="color:var(--ac)">'+fmt(qty)+'</strong>개 | 재고금액: '+fmtM(inv.amount)+'</div>'
  +'<div class="pn" style="margin-bottom:12px"><div class="pt" style="color:var(--or)">월평균출고 계산 과정</div>'
  +'<div style="font-size:12px;line-height:1.8">'
  +'<div style="margin-bottom:8px"><span style="color:var(--tx2)">데이터 소스:</span> <strong>'+(isC?'판매현황(isd) 수량':'수불부(mio) 정상출고')+'</strong></div>'
  +'<div style="margin-bottom:8px"><span style="color:var(--tx2)">첫 거래월:</span> <strong style="color:var(--ac2)">'+firstMonth+'</strong>'
  +(firstIdx>=0?' (활동 '+activeMs.length+'개월)':'')+'</div>'
  +'<div style="margin-bottom:8px"><span style="color:var(--tx2)">평균 산출 기간:</span> <strong>'+useMs.length+'개월</strong> '
  +(activeMs.length<=6?'<span class="tg tg-y">신규아이템 - 첫 거래월부터 전체</span>':'<span class="tg tg-b">최근 6개월</span>')+'</div>'
  +'<table style="margin:8px 0"><thead><tr><th>월</th>'+useMs.map(m=>'<th class="tr">'+m.slice(2)+'</th>').join('')+'<th class="tr" style="font-weight:700">합계</th></tr></thead>'
  +'<tbody><tr><td>'+(isC?'판매수량':'출고수량')+'</td>'+monthVals.map(x=>'<td class="tr"'+(x.v>0?' style="color:var(--gn)"':'')+'>'+fmt(x.v)+'</td>').join('')
  +'<td class="tr" style="font-weight:700">'+fmt(totalOut)+'</td></tr></tbody></table>'
  +'<div style="background:var(--sf2);padding:10px;border-radius:6px;margin-top:8px">'
  +'<div style="font-size:13px;font-weight:600;margin-bottom:4px">계산 결과</div>'
  +'<div>월평균출고 = '+fmt(totalOut)+' ÷ '+useMs.length+' = <strong style="color:var(--ac);font-size:15px">'+avgOut.toFixed(1)+'</strong>개/월</div>'
  +(avgOut>0?'<div>보유월수 = '+fmt(qty)+' ÷ '+avgOut.toFixed(1)+' = <strong style="color:var(--or);font-size:15px">'+holdMonths.toFixed(1)+'</strong>개월</div>':'')
  +'<div style="margin-top:6px">'
  +(isExc?'<span class="tg tg-p" style="font-size:12px">과다재고 (6개월 초과)</span>':'')
  +(isND?'<span class="tg tg-r" style="font-size:12px">무수요 (최근 6개월 출고 0)</span>':'')
  +(!isExc&&!isND?'<span class="tg tg-g" style="font-size:12px">정상</span>':'')
  +'</div></div></div></div>'
  +'<div style="text-align:right"><div class="btn" onclick="openHistory(\''+sku+'\')">월별 입출고 상세 보기</div></div>'
  +'</div></div>';
}

function renderFcastSkuModal(){
  const sku=S.modalData&&S.modalData.sku_id;if(!sku)return'';
  const item=D.isd.find(i=>i.sku_id===sku);
  const inv=D.inv.find(i=>i.sku_id===sku);
  const io=mio[sku]||{};
  const name=item?item.name:(inv?inv.item_name:sku);
  const allMs=[...M25,...M26_DATA];
  const qtyData=allMs.map(m=>item&&item.monthly[m]?item.monthly[m].qty:0);
  const amtData=allMs.map(m=>item&&item.monthly[m]?item.monthly[m].amt:0);
  const ioIn=allMs.map(m=>io[m]?io[m].iq||0:0);
  const ioOut=allMs.map(m=>io[m]?io[m].on||0:0);
  const ioEq=allMs.map(m=>io[m]?io[m].eq:null);
  // Simple forecast: 3-month avg + trend
  const recentQ=qtyData.slice(-3);const avgQ=recentQ.reduce((s,v)=>s+v,0)/Math.max(1,recentQ.filter(v=>v>0).length||1);
  const t=recentQ.length>=3&&recentQ[0]>0?(recentQ[2]-recentQ[0])/recentQ[0]:0;
  const fcQ=[Math.max(0,Math.round(avgQ*(1+t*.3))),Math.max(0,Math.round(avgQ*(1+t*.2))),Math.max(0,Math.round(avgQ*(1+t*.4)))];
  const recentA=amtData.slice(-3);const avgA=recentA.reduce((s,v)=>s+v,0)/Math.max(1,recentA.filter(v=>v>0).length||1);
  const fcA=fcQ.map(q=>avgQ>0?Math.round(q*(avgA/avgQ)):0);
  const y25total=M25.reduce((s,m)=>s+(item&&item.monthly[m]?item.monthly[m].qty:0),0);
  const y26total=M26_DATA.reduce((s,m)=>s+(item&&item.monthly[m]?item.monthly[m].qty:0),0);
  const y25amt=M25.reduce((s,m)=>s+(item&&item.monthly[m]?item.monthly[m].amt:0),0);
  const y26amt=M26_DATA.reduce((s,m)=>s+(item&&item.monthly[m]?item.monthly[m].amt:0),0);
  const avgPrice26=y26total>0?y26amt/y26total:0;
  const ss=calcSS(sku);const curEq=io[allMs[allMs.length-1]]?io[allMs[allMs.length-1]].eq:0;
  return'<div class="modal-overlay" onclick="if(event.target===this){_closeAllModals()}"><div class="modal" role="dialog" aria-modal="true" tabindex="-1" style="max-width:1000px">'
  +'<button class="close" aria-label="닫기" onclick="_closeAllModals()">✕</button>'
  +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+(S.modalHistory.length>0?'<div class="btn" onclick="goBackModal()" style="font-size:11px;padding:2px 10px">← 뒤로</div>':'')
  +'<h3 style="margin:0">'+name+' <span style="font-size:12px;color:var(--tx2);font-weight:400">('+sku+')</span></h3></div>'
  +'<div class="kr" style="margin:12px 0">'
  +'<div class="kc"><div class="lb">25년 합계</div><div class="vl">'+(y25total>0?fmt(y25total)+'개':'-')+'</div><div class="sb">'+fmtM(y25amt)+'</div></div>'
  +'<div class="kc"><div class="lb">26년 합계(1~3월)</div><div class="vl c-bl">'+fmt(y26total)+'개</div><div class="sb">'+fmtM(y26amt)+'</div></div>'
  +'<div class="kc"><div class="lb">평균단가(26)</div><div class="vl c-gn">'+fmtM(avgPrice26)+'</div><div class="sb">'+fmt(y26total)+'개 기준</div></div>'
  +'<div class="kc"><div class="lb">현재고 / 안전재고</div><div class="vl '+(curEq<ss?'c-rd':'c-gn')+'">'+fmt(curEq)+' / '+fmt(ss)+'</div></div>'
  +'<div class="kc"><div class="lb">4~6월 예측(수량)</div><div class="vl c-ac2">'+fcQ.map(v=>fmt(v)).join(' / ')+'</div><div class="sb">'+fmtM(fcA.reduce((s,v)=>s+v,0))+' 예상</div></div>'
  +'</div>'
  +'<div class="g2" style="margin-bottom:16px">'
  +'<div class="pn"><div class="pt">판매 추이 (수량)</div><div class="cc"><canvas id="cFcastSkuQ" aria-label="품목별 판매수량 추이"></canvas></div></div>'
  +'<div class="pn"><div class="pt">입출고 추이</div><div class="cc"><canvas id="cFcastSkuIO" aria-label="품목별 입출고 추이"></canvas></div></div>'
  +'</div>'
  +'<div class="pn"><div class="pt">월별 상세</div><div class="st" style="max-height:250px"><table>'
  +'<thead><tr><th>월</th><th class="tr">판매수량</th><th class="tr">판매금액</th><th class="tr">단가</th><th class="tr" style="color:var(--gn)">입고</th><th class="tr" style="color:var(--pp)">출고</th><th class="tr" style="color:var(--ac)">기말재고</th></tr></thead>'
  +'<tbody>'+[...allMs].reverse().map((m,idx)=>{
    const q=item&&item.monthly[m]?item.monthly[m].qty:0;
    const a=item&&item.monthly[m]?item.monthly[m].amt:0;
    const p=q>0?a/q:0;
    const d=io[m];
    return'<tr><td>'+m.slice(2)+'</td><td class="tr">'+fmt(q)+'</td><td class="tr">'+fmtM(a)+'</td><td class="tr">'+(q>0?fmtM(p):'-')+'</td>'
    +'<td class="tr" style="color:var(--gn)">'+(d&&d.iq?fmt(d.iq):'-')+'</td>'
    +'<td class="tr" style="color:var(--pp)">'+(d&&d.on?fmt(d.on):'-')+'</td>'
    +'<td class="tr" style="color:var(--ac)">'+(d?fmt(d.eq):'-')+'</td></tr>'
  }).join('')
  +'<tr style="font-weight:700;border-top:2px solid var(--bd);background:rgba(37,99,235,.04)"><td>예측 4~6월</td>'
  +'<td class="tr" style="color:var(--ac)">'+fcQ.map(v=>fmt(v)).join(' / ')+'</td>'
  +'<td class="tr" style="color:var(--ac)">'+fcA.map(v=>fmtM(v)).join(' / ')+'</td>'
  +'<td class="tr">'+(avgPrice26>0?fmtM(avgPrice26):'-')+'</td><td colspan="3"></td></tr>'
  +'</tbody></table></div></div>'
  +'</div></div>';
}

function renderPurchVendorModal(){

  const selMs=getSelectedMonths();const selSet=new Set(selMs);

  const totalAmt=vp.reduce((s,r)=>s+r.amount,0);
  const totalQty=vp.reduce((s,r)=>s+r.qty,0);

  // 품목별 집계
  const itemAgg={};
  vp.forEach(r=>{
    const k=r.sku_id;const m=r.date.substring(0,7).replace('/','-');
    if(!itemAgg[k])itemAgg[k]={sku:k,name:r.name,total:0,qty:0,cnt:0,monthly:{}};
    itemAgg[k].total+=r.amount;itemAgg[k].qty+=r.qty;itemAgg[k].cnt++;
    if(!itemAgg[k].monthly[m])itemAgg[k].monthly[m]={a:0,q:0};
    itemAgg[k].monthly[m].a+=r.amount;itemAgg[k].monthly[m].q+=r.qty;
  });
  const items=Object.values(itemAgg).sort((a,b)=>b.total-a.total);

  // 월별 합계
  const mTotals=selMs.map(m=>vp.filter(r=>r.date.substring(0,7).replace('/','-')===m).reduce((s,r)=>s+r.amount,0));
  const topItemPct=items.length>0&&totalAmt>0?(items[0].total/totalAmt*100).toFixed(1):'0';

  const backBtn=S.modalHistory.length>0?'<button onclick="goBackModal()" style="background:none;border:1px solid var(--bd);color:var(--tx);padding:4px 12px;border-radius:6px;cursor:pointer;margin-right:8px;font-size:12px">← 뒤로</button>':'';

    <div class="kr" style="margin-bottom:16px">
      <div class="kc"><div class="lb">구매금액</div><div class="vl c-bl" style="font-size:16px">${fmtM(totalAmt)}</div></div>
      <div class="kc"><div class="lb">구매수량</div><div class="vl" style="font-size:16px">${fmt(totalQty)}</div></div>
      <div class="kc"><div class="lb">거래건수</div><div class="vl" style="font-size:16px">${vp.length}건</div></div>
      <div class="kc"><div class="lb">구매품목</div><div class="vl" style="font-size:16px">${items.length}종</div></div>
      <div class="kc"><div class="lb">TOP1 비중</div><div class="vl c-rd" style="font-size:16px">${topItemPct}%</div></div>
    </div>
    ${selMs.length>1?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      ${selMs.map((m,mi)=>`<div class="kc" style="flex:1;min-width:80px"><div class="lb">${m.slice(5)}월</div><div class="vl" style="font-size:14px">${fmtM(mTotals[mi])}</div></div>`).join('')}

      <tbody>${items.map((i,idx)=>{
        const pct=totalAmt>0?(i.total/totalAmt*100).toFixed(1):'0';

  // 월별 생산가능수량 추이 (2026년~ 만)

  const salesAvg=_cSalesAvg(sku);

    const ss=calcSS(c.child_sku);
    const isOut=q<=0;
    const isShort=q>0&&ss>0&&q<ss;

    const cap=c.qty>0?Math.floor(q/c.qty):0;

  }).sort((a,b)=>{

    </div>

      <div class="kc"><div class="lb">최근단가</div><div class="vl" style="color:var(--ac)">${fmt(latest.price)}</div><div class="sb">${latest.date}</div></div>
      <div class="kc"><div class="lb">최초단가</div><div class="vl">${fmt(oldest.price)}</div><div class="sb">${oldest.date}</div></div>

      <div class="kc"><div class="lb">최저단가</div><div class="vl c-gn">${fmt(minP)}</div></div>
      <div class="kc"><div class="lb">최고단가</div><div class="vl c-rd">${fmt(maxP)}</div></div>
      <div class="kc"><div class="lb">평균단가</div><div class="vl">${fmt(Math.round(avgP))}</div></div>
    </div>
    <div class="pn" style="padding:8px 12px;margin-bottom:10px">
      <div class="pt">단가 추이</div>
      <div style="height:220px"><canvas id="${chartId}"></canvas></div>
    </div>
    <div class="pn" style="padding:8px 12px">
      <div class="pt">구매 이력 <span class="badge">${all.length}건</span></div>

      const cumIn=bV+iV,cumOut=cumIn-oV,cumOther=cumOut-otV;
      const wfData=[[0,bV],[bV,cumIn],[cumOut,cumIn],[cumOther,cumOut],[0,eV]];
      const wfColors=['#2563eb','#15803d','#dc2626','#c2410c','#0e7490'];

      const wfUnit=isAmt?'':'개';
      _charts.push(new Chart(cWF,{type:'bar',data:{

// ========== CENTER TEXT PLUGIN ==========
const centerTextPlugin={id:'centerText',afterDraw(chart){
  if(!chart.config.options.plugins.centerText)return;
  const {label,value}=chart.config.options.plugins.centerText;
  const {ctx,chartArea:{left,right,top,bottom}}=chart;
  const cx=(left+right)/2,cy=(top+bottom)/2;
  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='middle';
  if(label){ctx.fillStyle='#475569';ctx.font='11px sans-serif';ctx.fillText(label,cx,cy-12)}
  if(value){ctx.fillStyle='#1e293b';ctx.font='bold 18px sans-serif';ctx.fillText(value,cx,cy+8)}
  ctx.restore();
}};
Chart.register(centerTextPlugin);

// ========== DONUT LABEL PLUGIN (click toggle) ==========
const donutLabelPlugin={id:'donutLabels',afterDraw(chart){
  if(chart.config.type!=='doughnut')return;
  const cfg=chart.config.options.plugins.donutLabels;if(!cfg)return;
  const ctx=chart.ctx;ctx.save();
  const ds=chart.data.datasets[0];const meta=chart.getDatasetMeta(0);
  const total=ds.data.reduce((s,v)=>s+v,0);
  const showAmt=!!chart._showValues;
  const fmt2=cfg.formatter;
  meta.data.forEach((arc,i)=>{
    const v=ds.data[i];if(!v||v===0)return;
    const pct=total>0?Math.round(v/total*100):0;
    const midAngle=(arc.startAngle+arc.endAngle)/2;
    const r=(arc.innerRadius+arc.outerRadius)/2;
    const x=arc.x+Math.cos(midAngle)*r;
    const y=arc.y+Math.sin(midAngle)*r;
    const angleDiff=arc.endAngle-arc.startAngle;
    if(angleDiff<0.25)return;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';
    if(showAmt){
      ctx.font='bold 9px sans-serif';
      const amtTxt=fmt2?fmt2(v,pct):fmtM(v);
      ctx.fillText(amtTxt,x,y-6);
      ctx.font='bold 10px sans-serif';
      ctx.fillText(pct+'%',x,y+7);
    } else {
      ctx.font='bold 11px sans-serif';
      ctx.fillText(pct+'%',x,y);
    }
  });
  ctx.restore();
}};
Chart.register(donutLabelPlugin);

// ========== BAR LABEL PLUGIN ==========
const barLabelPlugin={id:'barLabels',afterDatasetsDraw(chart){
  const cfg=chart.config.options.plugins.barLabels;if(!cfg)return;
  const ctx=chart.ctx;ctx.save();
  const {chartArea:{top:cTop,bottom:cBot}}=chart;
  const chartH=cBot-cTop;
  chart.data.datasets.forEach((ds,di)=>{
    const meta=chart.getDatasetMeta(di);if(meta.hidden)return;
    const isLine=ds.type==='line';
    // segmentLabels mode: label each stacked segment inside
    if(!isLine&&cfg.segmentLabels){
      meta.data.forEach((el,i)=>{
        const v=ds.data[i];if(!v||v===0)return;
        const barTop=el.y;const barBot=el.base!=null?el.base:cBot;
        const barH=Math.abs(barBot-barTop);
        if(barH<14)return;// too small to fit text
        const cy=(barTop+barBot)/2;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.font='bold 9px sans-serif';
        ctx.fillStyle='rgba(255,255,255,.9)';
        ctx.fillText(v,el.x,cy);
      });
      return;
    }
    // Skip stacked bars except the last visible stacked one (to avoid overlap)
    if(!isLine&&cfg.stackedTotal){
      const stackIdx=chart.data.datasets.filter((d,j)=>j<=di&&d.type!=='line'&&!chart.getDatasetMeta(j).hidden).length;
      const totalBars=chart.data.datasets.filter((d,j)=>d.type!=='line'&&!chart.getDatasetMeta(j).hidden).length;
      if(stackIdx<totalBars)return; // only label topmost stacked bar
    }
    meta.data.forEach((el,i)=>{
      const v=ds.data[i];if(v==null)return;
      const numV=Array.isArray(v)?v[1]-v[0]:v;
      if(numV===0&&!cfg.showZero)return;
      if(isLine){
        if(!cfg.lineFormatter)return;
        const txt=cfg.lineFormatter(numV,di,i);
        ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.font='bold 10px sans-serif';ctx.fillStyle=ds.borderColor||'#15803d';
        ctx.fillText(txt,el.x,el.y-5);
      } else {
        const fmt=cfg.formatter;if(!fmt)return;
        const txt=fmt(v,di,i);
        const barTop=Array.isArray(v)?Math.min(el.y,el.base||cBot):el.y;
        const barBot=Array.isArray(v)?Math.max(el.y,el.base||cBot):el.base||cBot;
        const barH=barBot-barTop;
        ctx.textAlign='center';ctx.font='bold 10px sans-serif';
        if(barH>28){
          ctx.textBaseline='top';
          ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=3;ctx.lineJoin='round';
          ctx.strokeText(txt,el.x,barTop+5);
          ctx.fillStyle='#1e293b';
          ctx.fillText(txt,el.x,barTop+5);
        } else {
          ctx.textBaseline='bottom';ctx.fillStyle='#1e293b';
          ctx.fillText(txt,el.x,barTop-3);
        }
      }
    });
  });
  ctx.restore();
}};
Chart.register(barLabelPlugin);

// ========== INIT ==========
Chart.defaults.color='#475569';Chart.defaults.borderColor='rgba(100,116,139,.15)';
Chart.defaults.plugins.tooltip.titleFont={size:13,weight:'bold'};
Chart.defaults.plugins.tooltip.bodyFont={size:12};
Chart.defaults.plugins.tooltip.padding=10;
Chart.defaults.plugins.tooltip.displayColors=true;
render();
</script>
