<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root{--bg:#f1f5f9;--sf:#ffffff;--sf2:#e2e8f0;--bd:#8896a8;--tx:#1e293b;--tx2:#475569;--ac:#2563eb;--ac2:#0e7490;--gn:#15803d;--rd:#dc2626;--yl:#92400e;--or:#c2410c;--pp:#7e22ce}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.app{display:flex;height:100vh}
.sidebar{width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-hdr{padding:16px;border-bottom:1px solid var(--bd)}
.sidebar-hdr h1{font-size:15px;font-weight:700;color:var(--ac)}
.sidebar-hdr p{font-size:10px;color:var(--tx2);margin-top:3px}
.nav{flex:1;padding:8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--tx2);transition:all .15s;margin-bottom:1px}
.ni:hover{background:var(--sf2);color:var(--tx)}.ni.active{background:var(--ac);color:#fff}
.ni .ic{width:16px;text-align:center;font-size:13px}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.kpi-sticky{position:sticky;top:-20px;z-index:10;background:var(--bg);padding-bottom:8px;margin:-20px -24px 12px -24px;padding:16px 24px 8px 24px}
.kpi-sticky .kr{margin-bottom:8px}
.kr{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.kc{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px}
.kc .lb{font-size:11px;color:var(--tx2);margin-bottom:5px}.kc .vl{font-size:20px;font-weight:700}.kc .sb{font-size:10px;color:var(--tx2);margin-top:3px}
.pn{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;margin-bottom:16px}
.pt{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:10px;background:var(--ac);color:#fff;padding:2px 8px;border-radius:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
table{width:100%;border-collapse:collapse;font-size:11.5px}
th{text-align:left;padding:8px 10px;background:var(--sf2);color:var(--tx2);font-weight:600;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:1;white-space:nowrap}
th.sortable{cursor:pointer;user-select:none}th.sortable:hover{color:var(--ac)}
td{padding:7px 10px;border-bottom:1px solid var(--bd)}
tr:hover td{background:rgba(59,130,246,.06)}
tr.clickable{cursor:pointer}tr.clickable:hover td{background:rgba(59,130,246,.1)}
.tr{text-align:right}.tc{text-align:center}
.st{max-height:500px;overflow-y:auto;border-radius:8px;border:1px solid var(--bd)}
.tg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600}
.tg-g{background:rgba(34,197,94,.12);color:var(--gn)}.tg-r{background:rgba(239,68,68,.1);color:var(--rd)}
.tg-y{background:rgba(234,179,8,.1);color:var(--yl)}.tg-b{background:rgba(37,99,235,.1);color:var(--ac)}
.tg-p{background:rgba(126,34,206,.1);color:var(--pp)}.tg-c{background:rgba(14,116,144,.1);color:var(--ac2)}
.tb{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
input[type="text"],input[type="number"],select{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:6px 10px;border-radius:5px;font-size:11.5px;outline:none}
input:focus,select:focus{border-color:var(--ac)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:500;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);transition:all .15s}
.btn:hover{border-color:var(--ac);color:var(--ac)}
.xlsx-btn{margin-left:auto;background:#107c41;color:#fff;border:1px solid #0b5a30;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.xlsx-btn:hover{background:#0b5a30}
.btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn.primary{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn-group{display:flex;gap:0}.btn-group .btn{border-radius:0}.btn-group .btn:first-child{border-radius:5px 0 0 5px}.btn-group .btn:last-child{border-radius:0 5px 5px 0}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:24px;width:90%;max-width:1000px;max-height:85vh;overflow-y:auto}
.modal .close{float:right;cursor:pointer;font-size:18px;color:var(--tx2);background:none;border:none}.modal .close:hover{color:var(--tx)}
.modal h3{font-size:16px;margin-bottom:16px}
.cc{position:relative;height:240px}
.cc-donut{position:relative;height:320px;display:flex;align-items:center;justify-content:center}
.c-gn{color:var(--gn)}.c-rd{color:var(--rd)}.c-bl{color:var(--ac)}.c-yl{color:var(--yl)}.c-pp{color:var(--pp)}.c-cy{color:var(--ac2)}
.sr{display:flex;align-items:center;gap:16px;padding:8px 0;border-bottom:1px solid var(--bd)}
.sr label{width:160px;font-size:12px;color:var(--tx2)}.sr input,.sr select{width:180px}
.wc{background:var(--sf2);border-radius:8px;padding:14px;margin-bottom:6px;display:flex;align-items:center;gap:12px}
.month-btn{padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx2);transition:all .15s}
.month-btn:hover{border-color:var(--ac);color:var(--ac)}
.month-btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
.month-btn.no-data{opacity:.5;border-style:dashed}
.month-btn.no-data.active{opacity:.8}
.no-data-notice{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:6px;padding:8px 14px;margin-bottom:12px;font-size:11px;color:var(--yl)}
.period-bar{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.period-bar .label{font-size:11px;color:var(--tx2);margin-right:4px}
.alert-row{background:rgba(239,68,68,.08);border-left:3px solid var(--rd)}
.cal-cell{position:relative;padding:6px 3px;border-radius:5px;font-size:11px;text-align:center;min-height:52px;background:var(--sf2);cursor:pointer;transition:all .15s}
.cal-cell:hover{background:var(--bd)}
.cal-cell.today{border:2px solid var(--ac)}
.cal-cell.has-ev{background:rgba(59,130,246,.08)}
.cal-cell .day{color:var(--tx2);margin-bottom:2px;font-weight:500}
.cal-cell .dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.cal-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.cal-dot.ord{background:var(--ac)}.cal-dot.due{background:var(--or)}.cal-dot.comp{background:var(--gn)}
.cal-wk{font-size:10px;text-align:center;color:var(--tx2);padding:5px 2px;font-weight:600}
.cal-legend{display:flex;gap:14px;font-size:11px;color:var(--tx2);margin-top:8px}
.cal-cnt{font-size:8px;color:var(--tx);margin-top:1px}
.cal-legend span{display:flex;align-items:center;gap:3px}
[tabindex]:focus-visible,.btn:focus-visible,.month-btn:focus-visible,.ni:focus-visible,.modal .close:focus-visible{outline:2px solid var(--ac);outline-offset:2px;border-radius:4px}
tr.clickable:focus-visible td{background:rgba(37,99,235,.12);outline:none}
@media(max-width:1200px){.g2{grid-template-columns:1fr}}
</style>

<body>
<div class="app" id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="config.js"></script>
<script src="data_loader.js"></script>
<script>
// ========== LOADING UI ==========
document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column"><div style="width:40px;height:40px;border:4px solid #e2e8f0;border-top:4px solid #2563eb;border-radius:50%;animation:spin 1s linear infinite"></div><p id="load-msg" style="margin-top:16px;color:#475569;font-size:14px">데이터 로딩 중...</p><div style="width:300px;height:4px;background:#e2e8f0;border-radius:2px;margin-top:12px;overflow:hidden"><div id="load-fill" style="width:0%;height:100%;background:#2563eb;transition:width 0.3s"></div></div></div>';
(function(){const st=document.createElement('style');st.textContent='@keyframes spin{to{transform:rotate(360deg)}}';document.head.appendChild(st)})();

// ========== STATE ==========
const S={
  pg:'dashboard',search:'',fType:'all',fGrade:'all',fSkuType:'all',salesCat:'all',invCat:'all',
  modal:null,modalData:null,modalTab:0,modalHistory:[],
  vendorView:'score',vendorMonth:'all',
  bomTab:'used',bomFilter:'all',bomMonth:'current',bomSort:{col:'matCnt',dir:'desc'},wfMode:'qty',
  costSort:{col:'costRatio',dir:'desc'},costFilter:'all',costBand:'all',costMonth:'current',riskSort:{col:'cr',dir:'desc'},
  selMonth:'all',selYear:'2026',selPeriodMode:'month',
  ordSort:{col:'date',dir:'desc'},ordFilterCol:'all',ordFilterVal:'all',
  calFilter:'all',
  invSort:{col:'amount',dir:'desc'},invFilterCol:'all',invFilterVal:'all',
  salesSort:{col:'total_amt',dir:'desc'},taView:'amt',salesView:'amt',custSaleType:'all',purchPriceFilter:'all',priceVarFilter:'all',priceVarSku:null,priceVarBand:'all',
  bomDisc:{},
  cfg:{
    sl:{A:97,B:93,C:85},zs:{A:1.88,B:1.48,C:1.04},
    wh:[{id:'WH01',name:'본사 창고',loc:'서울 본사',on:true},{id:'WH02',name:'센터 창고',loc:'물류센터',on:true}],
    baseDate:'2025-12-31',lt:7,ltVar:2,demandVar:0.3,
    ssMonths:2,
    ssOverride:{},
    moq:{},
    moqAlert:true
  }
};

// ========== ASYNC DATA LOADING ==========
let D,M26,M26_DATA,M25,skuMap,mio,DATA_MONTHS;
async function _initDashboard(){
  try{
    const RAW_DATA=await initData((msg,pct)=>{
      const el=document.getElementById('load-msg');if(el)el.textContent=msg;
      const bar=document.getElementById('load-fill');if(bar)bar.style.width=pct+'%';
    });
    D=RAW_DATA;
    if(D.pl_data) window._PL_DATA_FROM_SHEETS=D.pl_data;
    M26=Array.from({length:12},(_,i)=>`2026-${String(i+1).padStart(2,'0')}`);
    M26_DATA=(D._meta&&D._meta.months_2026)||['2026-01','2026-02','2026-03'];
    M25=Array.from({length:12},(_,i)=>`2025-${String(i+1).padStart(2,'0')}`);
    S.selYear=M26_DATA[M26_DATA.length-1].slice(0,4);
    S.selMonth=M26_DATA[M26_DATA.length-1].slice(5);
    skuMap={};D.sku.forEach(s=>{skuMap[s.id]=s});
    mio=D.mio||{};
    DATA_MONTHS=[...M25,...M26_DATA];
    window.hasData=function(mk){return M26_DATA.includes(mk)||M25.includes(mk)};
    render();
  }catch(err){
    document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column"><p style="color:#dc2626;font-size:16px;font-weight:600">데이터 로딩 실패</p><p style="color:#475569;margin-top:8px">'+err.message+'</p><button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer">다시 시도</button></div>';
  }
}
_initDashboard();

// ========== CATEGORY MAPS ==========
const C_CATS={KI:'키오스크',BF:'배리어프리',PO:'포스',TO:'테이블오더',SC:'출입인증기',CV:'담배토출기',SV:'스마트자판기',KD:'KDS',OT:'기타'};
const B_CATS={KI:'키오스크',BF:'배리어프리',PO:'포스',TO:'테이블오더',SC:'출입인증기',CV:'담배토출기',SV:'스마트자판기',KD:'KDS',VA:'VAN 품목',BR:'브라켓',RD:'리더기',MP:'멀티패드',SP:'서명패드',PR:'프린터',TM:'단말기',ST:'스탠드',OT:'기타'};
function getSkuCat(id){const base=id.length>=4?id.substring(2,4):'OT';if(base==='KI'){const p=id.split('-');const sf=p[p.length-1];if(sf.length>=3&&sf[2]==='8')return'BF'}return base}

// ========== UTILS ==========
// 테이블 → CSV(Excel) 다운로드 (UTF-8 BOM 포함, 한글 정상)
function _cellText(cell){
  let inp=cell.querySelector('input,select');
  let txt;
  if(inp){txt=inp.type==='checkbox'?(inp.checked?'Y':'N'):(inp.value||'')}
  else{txt=cell.innerText||cell.textContent||''}
  return txt.replace(/\r?\n/g,' ').replace(/\s+/g,' ').trim();
}
// 숫자 문자열이면 Number로 변환 (엑셀 집계 가능하게)
function _toNum(s){
  if(s===''||s==null)return s;
  let t=String(s).replace(/,/g,'').replace(/[₩%]/g,'').trim();
  if(/^-?\d+(\.\d+)?$/.test(t))return Number(t);
  return s;
}
function _extractSku(tr){
  if(tr.getAttribute('data-sku'))return tr.getAttribute('data-sku');
  // onclick 속성에서 품목코드 패턴(C-/B- 접두어) 추출
  let oc=tr.getAttribute('onclick')||'';
  let m=oc.match(/['"]([CB]-[A-Za-z0-9\-]+)['"]/);
  if(m)return m[1];
  // 셀 내부에서 품목코드 텍스트 탐색 (monospace/고정폭 셀에 주로 있음)
  let cells=tr.querySelectorAll('td');
  for(let i=0;i<cells.length;i++){
    let t=(cells[i].innerText||cells[i].textContent||'').trim();
    let mm=t.match(/\b([CB]-[A-Za-z0-9\-]{3,})\b/);
    if(mm)return mm[1];
  }
  return '';
}
function _tableHasSkuColumn(tbl){
  // 기존 테이블에 이미 품목코드가 보이는 셀이 있는지 체크 (중복열 방지)
  let trs=tbl.querySelectorAll('tbody tr');
  for(let i=0;i<Math.min(trs.length,5);i++){
    let cells=trs[i].querySelectorAll('td');
    for(let j=0;j<cells.length;j++){
      let t=(cells[j].innerText||cells[j].textContent||'').trim();
      if(/^[CB]-[A-Za-z0-9\-]{3,}/.test(t))return true;
    }
  }
  return false;
}
function _tableToAoA(tbl){
  let head=[],body=[];
  let trs=tbl.querySelectorAll('tr');
  // 품목코드 열을 자동 추가할지 결정: 어떤 행에서든 SKU가 추출되고, 시각 테이블에 이미 SKU 열이 없을 때
  let hasSkuCol=_tableHasSkuColumn(tbl);
  let skuMap=new Map();let anySku=false;
  trs.forEach(function(tr){let s=_extractSku(tr);if(s){skuMap.set(tr,s);anySku=true}});
  let prependSku=anySku&&!hasSkuCol;
  trs.forEach(function(tr,idx){
    let cells=tr.querySelectorAll('th,td');if(!cells.length)return;
    let isHead=tr.parentElement&&tr.parentElement.tagName==='THEAD';
    if(idx===0&&head.length===0&&!isHead)isHead=true;
    let row=[];
    if(prependSku)row.push(isHead?'품목코드':(skuMap.get(tr)||''));
    cells.forEach(function(c){let t=_cellText(c);row.push(isHead?t:_toNum(t))});
    if(isHead&&head.length===0)head.push(row);else body.push(row);
  });
  return head.concat(body);
}
function exportTableCSV(btn,filename){
  // 하위호환 이름 유지 — 실제로는 .xlsx 로 저장
  exportTableXLSX(btn,filename);
}
function exportTableXLSX(btn,filename){
  if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로딩 실패 (네트워크 확인)');return}
  let c=btn.closest('.pn')||btn.closest('.modal')||btn.closest('.pg')||document;
  let tbls=c.querySelectorAll('table');
  if(!tbls.length){alert('테이블을 찾을 수 없습니다');return}
  let wb=XLSX.utils.book_new();
  let used={};
  tbls.forEach(function(tbl,ti){
    let aoa=_tableToAoA(tbl);
    if(!aoa.length)return;
    let ws=XLSX.utils.aoa_to_sheet(aoa);
    // 컬럼 너비 자동
    let cols=[];let nCol=aoa[0].length;
    for(let i=0;i<nCol;i++){
      let mx=10;
      aoa.forEach(function(r){let v=r[i]==null?'':String(r[i]);let w=0;for(let k=0;k<v.length;k++)w+=(v.charCodeAt(k)>127?2:1);if(w>mx)mx=w});
      cols.push({wch:Math.min(mx+2,40)});
    }
    ws['!cols']=cols;
    // 헤더 스타일 (배경색+굵게+흰색+중앙정렬)
    let headStyle={fill:{patternType:'solid',fgColor:{rgb:'2563EB'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:11},alignment:{horizontal:'center',vertical:'center'},border:{top:{style:'thin',color:{rgb:'1E40AF'}},bottom:{style:'thin',color:{rgb:'1E40AF'}},left:{style:'thin',color:{rgb:'1E40AF'}},right:{style:'thin',color:{rgb:'1E40AF'}}}};
    for(let i=0;i<nCol;i++){
      let ref=XLSX.utils.encode_cell({c:i,r:0});
      if(ws[ref]){ws[ref].s=headStyle}
    }
    // 숫자 셀 천단위 포맷
    for(let r=1;r<aoa.length;r++){
      for(let i=0;i<nCol;i++){
        let ref=XLSX.utils.encode_cell({c:i,r:r});
        if(ws[ref]&&typeof ws[ref].v==='number'){ws[ref].s={numFmt:'#,##0',alignment:{horizontal:'right'}}}
      }
    }
    // 1행 고정
    ws['!freeze']={xSplit:0,ySplit:1};ws['!views']=[{state:'frozen',ySplit:1}];
    let name=(filename||'Sheet')+(tbls.length>1?'_'+(ti+1):'');
    name=name.replace(/[\\\/\?\*\[\]:]/g,'_').slice(0,31);
    if(used[name]){used[name]++;name=name.slice(0,28)+'_'+used[name]}else used[name]=1;
    XLSX.utils.book_append_sheet(wb,ws,name);
  });
  let dt=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,(filename||'export')+'_'+dt+'.xlsx');
}
// 한글 검색 debounce (IME 조합 중 render 방지)
let _sTimer;
function doSearch(v){S.search=v;clearTimeout(_sTimer);_sTimer=setTimeout(()=>{render();setTimeout(()=>{const el=document.querySelector('input[type=text]:focus,input[oninput*=doSearch]');if(!el){const inputs=document.querySelectorAll('input[type=text]');inputs.forEach(inp=>{if(inp.value===S.search){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length)}})}},10)},200)}

const fmt=n=>n==null?'0':Number(n).toLocaleString('ko-KR');
const fmtM=n=>{if(!n||n===0)return'0.00M';return(n/1e6).toFixed(2)+'M'};
const fmtP=n=>{if(!n||n===0)return'-';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M';if(Math.abs(n)>=1e4)return(n/1e4).toFixed(1)+'만';return fmt(Math.round(n))+'원'};
const pct=(a,b)=>b?((a/b)*100).toFixed(1):'0';
const getGrade=id=>{const s=skuMap[id];return s&&s.g?s.g:'C'};
const getSkuType=id=>{if(!id)return'기타';if(id.startsWith('C-'))return'제품(C)';if(id.startsWith('B-'))return'원재료(B)';return'기타'};
const getZ=g=>S.cfg.zs[g]||1.04;

// ========== TREND UTILS ==========
function sma(data,period){
  return data.map((_,i)=>{
    if(i<period-1)return null;
    const sl=data.slice(i-period+1,i+1).filter(v=>v!=null);
    return sl.length>0?sl.reduce((s,v)=>s+v,0)/sl.length:null;
  });
}
function linearTrend(data,extN){
  const valid=data.map((v,i)=>v!=null?[i,v]:null).filter(Boolean);
  if(valid.length<2)return data.map(()=>null);
  const n=valid.length;
  const sx=valid.reduce((s,[x])=>s+x,0),sy=valid.reduce((s,[,y])=>s+y,0);
  const sxy=valid.reduce((s,[x,y])=>s+x*y,0),sx2=valid.reduce((s,[x])=>s+x*x,0);
  const slope=(n*sxy-sx*sy)/(n*sx2-sx*sx),intercept=(sy-slope*sx)/n;
  const result=data.map((_,i)=>Math.round(slope*i+intercept));
  if(extN){for(let j=1;j<=extN;j++)result.push(Math.round(slope*(data.length-1+j)+intercept))}
  return result;
}
function stdDev(data,trend){
  const pairs=data.map((v,i)=>v!=null&&trend[i]!=null?v-trend[i]:null).filter(v=>v!=null);
  if(pairs.length<2)return 0;
  return Math.sqrt(pairs.reduce((s,d)=>s+d*d,0)/pairs.length);
}

// 안전재고: 설정월 포함 최근 3개월 평균출고 × N개월 (당월말 기준)
function getSSRefMonths(){
  const allMs=[...M25,...M26];
  let targetM;
  if(S.selMonth==='all'){
    const yrMs=S.selYear==='2025'?M25:M26;
    targetM=yrMs[yrMs.length-1];
  } else {
    targetM=S.selYear+'-'+S.selMonth;
  }
  const idx=allMs.indexOf(targetM);
  if(idx<0) return allMs.slice(-3);
  // 당월 포함 최근 3개월
  const start=Math.max(0,idx-2);
  return allMs.slice(start,idx+1);
}
// C- 판매 평균 (isd 기준, 최근 6개월 또는 첫 판매 이후 활성 기간)
function _cSalesAvg(sku){
  const item=D.isd&&D.isd.find(x=>x.sku_id===sku);
  if(!item)return 0;
  const last6=DATA_MONTHS.slice(-6);
  const firstIdx=DATA_MONTHS.findIndex(m=>item.monthly&&item.monthly[m]&&item.monthly[m].qty>0);
  const activeMs=firstIdx>=0?DATA_MONTHS.slice(firstIdx):last6;
  const useMs=activeMs.length<=6?activeMs:last6;
  if(useMs.length===0)return 0;
  const total=useMs.reduce((s,m)=>s+(item.monthly[m]?item.monthly[m].qty:0),0);
  return total/useMs.length;
}
// 개별 거래(sales_tx) 기반 판매 분석: 구독/렌탈(0원) 정확 분리
const _txCache={};
function _txSalesInfo(sku){
  if(_txCache[sku])return _txCache[sku];
  const tx=D.sales_tx?D.sales_tx.filter(t=>t.sku_id===sku):[];
  const paid=tx.filter(t=>(t.amt||0)>0);
  const zero=tx.filter(t=>!(t.amt||0)>0&&(t.qty||0)>0);
  const paidQty=paid.reduce((s,t)=>s+(t.qty||0),0);
  const paidAmt=paid.reduce((s,t)=>s+(t.amt||0),0);
  const rentalQty=zero.reduce((s,t)=>s+(t.qty||0),0);
  const totalQty=paidQty+rentalQty;
  const avgSP=paidQty>0?Math.round(paidAmt/paidQty):0;
  _txCache[sku]={paidQty,paidAmt,rentalQty,totalQty,avgSP};
  return _txCache[sku];
}
function calcSS(sku_id){
  if(S.cfg.ssOverride[sku_id]!=null) return S.cfg.ssOverride[sku_id];
  // C- 완제품: 판매출고(isd) 기준 평균 × ssMonths
  if(sku_id&&sku_id.startsWith('C-')){
    const avg=_cSalesAvg(sku_id);
    return avg>0?Math.ceil(avg*S.cfg.ssMonths):0;
  }
  // B- 자재: 이 자재를 사용하는 C- 완제품들의 판매출고(isd) × BOM 소요량 합산
  if(sku_id&&sku_id.startsWith('B-')&&D.bom){
    let monthlyNeed=0;
    D.bom.forEach(b=>{
      if(b.child_sku!==sku_id)return;
      if(!b.parent_sku||!b.parent_sku.startsWith('C-'))return;
      if(typeof BOM_EXCLUDE_GLOBAL!=='undefined'&&BOM_EXCLUDE_GLOBAL.has(b.parent_sku))return;
      const parentAvg=_cSalesAvg(b.parent_sku);
      monthlyNeed+=parentAvg*(b.qty||0);
    });
    return monthlyNeed>0?Math.ceil(monthlyNeed*S.cfg.ssMonths):0;
  }
  // 기타: 기존 로직 유지
  const io=mio[sku_id];
  if(!io) return 0;
  const refMs=getSSRefMonths();
  if(refMs.length===0) return 0;
  const outs=refMs.map(m=>io[m]?io[m].on||0:0);
  const avg=outs.reduce((s,v)=>s+v,0)/refMs.length;
  if(avg===0) return 0;
  return Math.ceil(avg * S.cfg.ssMonths);
}
// BOM 제외 리스트 (pgBom의 로컬 BOM_EXCLUDE와 동기화)
const BOM_EXCLUDE_GLOBAL=new Set(['C-KI220CDNA-WG14']);

// 데이터가 있는 월만 모은 배열 (async _initDashboard 내에서 초기화됨)

// 월평균 출고 (데이터 있는 기간만)
function monthlyAvgOut(sku_id){
  const io=mio[sku_id];
  // C- 아이템은 isd에서 판매수량 사용 (mio에 2025 데이터 없음)
  if(sku_id.startsWith('C-')){
    const item=D.isd.find(x=>x.sku_id===sku_id);
    if(!item)return io?_mioAvg(io):0;
    const last6=DATA_MONTHS.slice(-6);
    // 첫 판매월 찾기
    const firstIdx=DATA_MONTHS.findIndex(m=>item.monthly[m]&&item.monthly[m].qty>0);
    const activeMs=firstIdx>=0?DATA_MONTHS.slice(firstIdx):last6;
    const useMs=activeMs.length<=6?activeMs:last6;
    const total=useMs.reduce((s,m)=>s+(item.monthly[m]?item.monthly[m].qty:0),0);
    return useMs.length>0?total/useMs.length:0;
  }
  if(!io)return 0;
  return _mioAvg(io);
}
function _mioAvg(io){
  const last6=DATA_MONTHS.slice(-6);
  // 첫 입고월 찾기
  const firstIdx=DATA_MONTHS.findIndex(m=>io[m]&&(io[m].iq>0||io[m].on>0));
  const activeMs=firstIdx>=0?DATA_MONTHS.slice(firstIdx):last6;
  const useMs=activeMs.length<=6?activeMs:last6;
  const total=useMs.reduce((s,m)=>s+(io[m]?io[m].on||0:0),0);
  return useMs.length>0?total/useMs.length:0;
}

// 과다재고: 현재고 / 월평균출고 > 6개월
function isExcess(sku_id, qty){
  const avg=monthlyAvgOut(sku_id);
  if(avg<=0) return false;
  return qty/avg>6;
}

// 무수요: 데이터 있는 최근 6개월 연속 출고 없음 (타계정 출고 포함)
// on=정상출고, ot=타계정(양수=출고, 음수=입고). 수요는 on>0 또는 ot>0일 때
function isNoDemand(sku_id){
  const last6=DATA_MONTHS.slice(-6);
  // C- 아이템: isd 판매수량도 확인
  if(sku_id.startsWith('C-')){
    const item=D.isd.find(x=>x.sku_id===sku_id);
    if(item&&last6.some(m=>item.monthly[m]&&item.monthly[m].qty>0))return false;
  }
  const io=mio[sku_id];if(!io)return true;
  return last6.every(m=>{if(!io[m])return true;return(io[m].on||0)<=0&&(io[m].ot||0)<=0});
}

// 대분류별 출고 집계
function getCatOutbound(prefix, catMap, months){
  const result={};
  Object.keys(catMap).forEach(cat=>{result[cat]={total:0,monthly:{}}; months.forEach(m=>{result[cat].monthly[m]=0})});
  // mio 기반 집계
  Object.entries(mio).forEach(([sku,data])=>{
    if(!sku.startsWith(prefix+'-'))return;
    let cat=getSkuCat(sku);
    if(!catMap[cat])cat='OT';
    months.forEach(m=>{
      const out=data[m]?data[m].on||0:0;
      result[cat].total+=out;
      result[cat].monthly[m]+=out;
    });
  });
  // C- 아이템: mio에 없는 월은 isd(판매현황)에서 보완
  if(prefix==='C'){
    const mioSkus=new Set(Object.keys(mio).filter(k=>k.startsWith('C-')));
    D.isd.filter(i=>i.type&&i.type.includes('C')).forEach(item=>{
      let cat=getSkuCat(item.sku_id);
      if(!catMap[cat])cat='OT';
      months.forEach(m=>{
        // mio에 해당 월 데이터가 없는 경우만 isd에서 보완
        const hasMio=mioSkus.has(item.sku_id)&&mio[item.sku_id][m]&&(mio[item.sku_id][m].on>0);
        if(!hasMio&&item.monthly[m]&&item.monthly[m].qty>0){
          const qty=item.monthly[m].qty;
          result[cat].total+=qty;
          result[cat].monthly[m]+=qty;
        }
      });
    });
  }
  return result;
}

// MOQ 기반 발주필요 수량 계산
function calcReorder(sku_id, currentQty){
  const ss=calcSS(sku_id);
  if(currentQty>ss) return 0;
  const need=ss-currentQty;
  const moq=S.cfg.moq[sku_id]||0;
  if(moq<=0) return need;
  return Math.ceil(need/moq)*moq; // MOQ 배수로 올림
}

function getMonthEndQty(sku_id, month){
  const io=mio[sku_id];
  if(!io||!io[month]) return null;
  return io[month].eq;
}

}
function getMt(yr){return yr==='2025'?(D.mt25||{}):(D.mt26||{})}

function calcLeadDays(dateStr, dueStr){
  try{
    const parseD=s=>{const p=s.trim().split(/[\/ -]/);return new Date(+p[0],+p[1]-1,+p[2])};
    const d1=parseD(dateStr);const d2=parseD(dueStr);
    return Math.round((d2-d1)/(1000*60*60*24));
  }catch(e){return null}
}

// Sort helper
function sortArr(arr, col, dir, getter){
  return[...arr].sort((a,b)=>{
    let va=getter(a,col),vb=getter(b,col);
    if(typeof va==='string'){va=va.toLowerCase();vb=(vb||'').toLowerCase();return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}
    return dir==='asc'?(va-vb):(vb-va);
  });
}

function bindA11y(){
  // Make all interactive elements keyboard accessible
  document.querySelectorAll('.kc[onclick],.month-btn,.btn:not(button),.ni,th.sortable,tr.clickable').forEach(el=>{
    if(!el.hasAttribute('tabindex'))el.setAttribute('tabindex','0');
    el.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();el.click()}};
  });
}
function trapFocus(modal){
  const focusable=modal.querySelectorAll('button,[tabindex]:not([tabindex="-1"]),input,select,textarea,a[href]');
  if(focusable.length===0)return;
  const first=focusable[0],last=focusable[focusable.length-1];
  modal.addEventListener('keydown',e=>{
    if(e.key==='Escape'){_closeAllModals();return}
    if(e.key!=='Tab')return;
    if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus()}}
    else{if(document.activeElement===last){e.preventDefault();first.focus()}}
  });
}

  if(S.selMonth!=='all'){
    const poSelMs=new Set(selMs.map(m=>m.replace('-','/')));
    filteredPO=filteredPO.filter(p=>{const pm=p.date_no.substring(0,7).replace('-','/');return poSelMs.has(pm)});
  }
  const recentPO=filteredPO.slice(0,10);

  // 기초재고 (전월 기말)
  const allMsFull=[...M25,...M26];
  const lastIdx=allMsFull.indexOf(lastMk);
  const prevMk=lastIdx>0?allMsFull[lastIdx-1]:null;
  let beginQty=0,beginAmt=0;
  if(prevMk){Object.values(mio).forEach(d=>{if(d[prevMk]){beginQty+=d[prevMk].eq||0;beginAmt+=d[prevMk].ea||0}})}
  else{beginQty=endQty-pIn+pOut+pOther;beginAmt=endAmt-pInAmt+pOutAmt}
  const pOtherAmt=beginAmt+pInAmt-pOutAmt-endAmt; // 타계정금액 = 기초+입고-출고-기말 보정

  // 통합 캐스케이드 분류 — KPI·상세테이블 모두 동일 기준 사용
  // ⚠️ 재고부족/과다/무수요 분석은 원재료(B-)만 대상. 완제품(C-)은 BOM '생산가능' 지표로 관리.
  const getEqDash=sku=>mio[sku]&&mio[sku][lastMk]?mio[sku][lastMk].eq:(D.inv.find(x=>x.sku_id===sku)||{}).qty||0;
  const activeInvItems=D.inv.filter(i=>(i.qty!==0||i.amount!==0)&&i.sku_id.startsWith('B-'));
  const totalActive=activeInvItems.length;
  let cntNormal=0,cntLow2=0,cntExcess2=0,cntNoDemand2=0,cntNoStock2=0;
  const lowItems=[],excessItems=[],noDemandItems=[],noStockItems=[];
  activeInvItems.forEach(i=>{
    const ss=calcSS(i.sku_id);const eq=getEqDash(i.sku_id);
    const ratio=ss>0?eq/ss:999;
    if(eq===0){cntNoStock2++;noStockItems.push(i)}
    else if(ratio<1){cntLow2++;lowItems.push(i)}
    else if(isExcess(i.sku_id,eq)){cntExcess2++;excessItems.push(i)}
    else if(isNoDemand(i.sku_id)){cntNoDemand2++;noDemandItems.push(i)}
    else cntNormal++;
  });
  const healthWeighted=cntNormal*100+cntExcess2*60+cntNoDemand2*35+cntLow2*15+cntNoStock2*0;
  const healthScore=totalActive>0?Math.round(healthWeighted/(totalActive*100)*100):0;

  // 대분류별 출고 집계
  const selMsForCat=getYearMonths(yr);
  const cOut=getCatOutbound('C',C_CATS,selMsForCat);
  const bOut=getCatOutbound('B',B_CATS,selMsForCat);

  return`<div class="kpi-sticky"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h2 style="font-size:18px">재고 관제 대시보드</h2>${periodBar()}
  </div>
  ${noDataNotice()}
  <div class="kr">
    <div class="kc" style="cursor:pointer" onclick="scrollToDash('dash-asset')"><div class="lb">${endQtyLabel}</div><div class="vl c-bl">${fmt(endQty)}개</div><div class="sb">${mLabel}</div></div>
    <div class="kc" style="cursor:pointer" onclick="scrollToDash('dash-asset')"><div class="lb">재고 자산</div><div class="vl">${fmtM(endAmt)}</div><div class="sb">${mLabel}</div></div>
    <div class="kc"><div class="lb">입고 수량</div><div class="vl c-gn">${fmt(pIn)}개</div><div class="sb">${mLabel}</div></div>
    <div class="kc"><div class="lb">출고(정상)</div><div class="vl c-pp">${fmt(pOut)}개</div><div class="sb">${mLabel}</div></div>
    <div class="kc" style="cursor:pointer" onclick="scrollToDash('dash-low')"><div class="lb">재고부족</div><div class="vl ${(cntLow2+cntNoStock2)>5?'c-rd':'c-yl'}">${cntLow2+cntNoStock2}건</div><div class="sb">부족 ${cntLow2} + 재고없음 ${cntNoStock2}</div></div>
    <div class="kc" style="cursor:pointer" onclick="scrollToDash('dash-excess')"><div class="lb" style="color:var(--or)">과다재고</div><div class="vl" style="color:var(--or)">${cntExcess2}건</div><div class="sb">6개월분 초과</div></div>
    <div class="kc" style="cursor:pointer" onclick="scrollToDash('dash-nodemand')"><div class="lb" style="color:var(--pp)">무수요</div><div class="vl c-pp">${cntNoDemand2}건</div><div class="sb">6개월+ 미출고</div></div>
    <div class="kc" style="cursor:pointer" onclick="scrollToDash('dash-health')"><div class="lb">재고 건강도</div><div class="vl ${healthScore>=70?'c-gn':healthScore>=40?'c-yl':'c-rd'}">${healthScore}점</div><div class="sb">안정성 평가</div></div>
  </div></div>
  <div class="g2">
    <div class="pn"><div class="pt" style="display:flex;align-items:center;gap:8px">재고 흐름 워터풀 <span class="badge">${S.selMonth==='all'?yr+'년':parseInt(lastMk.slice(5))+'월'}</span>
      <div style="margin-left:auto;display:flex;gap:4px">
        <button onclick="S.wfMode='qty';render()" style="padding:2px 8px;font-size:10px;border-radius:4px;border:1px solid var(--bd);cursor:pointer;background:${S.wfMode==='qty'?'var(--ac)':'var(--sf)'};color:${S.wfMode==='qty'?'#fff':'var(--tx)'}">수량</button>
        <button onclick="S.wfMode='amt';render()" style="padding:2px 8px;font-size:10px;border-radius:4px;border:1px solid var(--bd);cursor:pointer;background:${S.wfMode==='amt'?'var(--ac)':'var(--sf)'};color:${S.wfMode==='amt'?'#fff':'var(--tx)'}">금액</button>
      </div></div>
      <div class="cc" style="height:260px"><canvas id="cWaterfall" aria-label="재고 흐름 워터풀 차트" role="img"></canvas></div>
      <div style="font-size:10px;color:var(--tx2);margin-top:4px;text-align:center">${S.wfMode==='qty'?
        `기초 ${fmt(beginQty)} + 입고 ${fmt(pIn)} − 출고 ${fmt(pOut)} − 타계정 ${fmt(pOther)} = 기말 ${fmt(endQty)}`
        :`기초 ${fmtM(beginAmt)} + 입고 ${fmtM(pInAmt)} − 출고 ${fmtM(pOutAmt)} − 기타 ${fmtM(pOtherAmt>0?pOtherAmt:0)} = 기말 ${fmtM(endAmt)}`}</div>
    </div>
    <div class="pn" id="dash-health"><div class="pt">재고 건강도 게이지</div>

      <div style="display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:10px;color:var(--tx2)">

        <span style="color:var(--yl)">●부족 ${cntLow2}</span>
        <span style="color:var(--rd)">●재고없음 ${cntNoStock2}</span>
        <span style="color:var(--or)">●과다 ${cntExcess2}</span>

  <div class="g2">

        <thead><tr><th>일자</th><th>거래처</th><th>품목</th><th class="tr">금액</th><th>상태</th></tr></thead>
        <tbody>${recentPO.map(p=>`<tr>
          <td style="white-space:nowrap;font-size:10px">${cleanDate(p.date_no)}</td>
          <td style="max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.vendor}</td>
          <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.item_name}</td>
          <td class="tr">${fmtM(p.amount)}</td>
          <td><span class="tg ${p.status==='완료'?'tg-g':p.status==='진행중'?'tg-y':'tg-r'}">${p.status}</span></td></tr>`).join('')}</tbody></table></div></div>
  </div>
  <div class="g2">
    <div class="pn" id="dash-asset"><div class="pt">재고 자산 현황 (원재료) <span class="badge">${invB.length}품목</span><button class="xlsx-btn" onclick="exportTableCSV(this,'재고자산현황')">📥 엑셀</button></div><div class="st" style="max-height:500px"><table>
      <thead><tr><th>#</th><th>품목명</th><th class="tr">수량</th><th class="tr">재고금액</th><th class="tr">안전재고</th><th class="tr">MOQ</th><th>상태</th></tr></thead>
      <tbody>${invB.map(i=>{const d=mio[i.sku_id]&&mio[i.sku_id][lastMk]?mio[i.sku_id][lastMk]:{eq:i.qty,ea:i.amount};return{...i,eq:d.eq||0,ea:d.ea||0}})
        .sort((a,b)=>(b.ea||0)-(a.ea||0)).map((i,idx)=>{
        const ss=calcSS(i.sku_id);const moq=S.cfg.moq[i.sku_id]||0;const ratio=ss>0?i.eq/ss:999;
        let st='정상',sc='tg-g';if(ratio<.5){st='긴급';sc='tg-r'}else if(ratio<1){st='부족';sc='tg-y'}
        if(isExcess(i.sku_id,i.eq)){st='과다';sc='tg-p'}
        return`<tr class="clickable" onclick="openHistory('${i.sku_id}')">
          <td style="color:var(--tx2);font-size:10px">${idx+1}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.item_name}</td>
          <td class="tr">${fmt(i.eq)}</td><td class="tr">${fmtM(i.ea)}</td>
          <td class="tr" style="color:var(--yl)">${fmt(ss)}</td>
          <td class="tr" style="color:var(--ac2)">${moq||'-'}</td>
          <td><span class="tg ${sc}">${st}</span></td></tr>`}).join('')}</tbody></table></div></div>
    <div class="pn" id="dash-low"><div class="pt">재고 부족 경고 <span class="badge" style="background:var(--rd)">${cntLow2+cntNoStock2}</span> <span style="font-size:10px;color:var(--tx2);font-weight:400">부족 ${cntLow2} + 재고없음 ${cntNoStock2}</span><button class="xlsx-btn" onclick="exportTableCSV(this,'재고부족경고')">📥 엑셀</button></div><div class="st" style="max-height:500px"><table>
      <thead><tr><th>#</th><th>상태</th><th>품목</th><th class="tr">현재고</th><th class="tr">안전재고</th><th class="tr">MOQ</th><th class="tr">발주필요</th><th>달성률</th></tr></thead>
      <tbody>${[...noStockItems.map(i=>({...i,_st:'없음'})),...lowItems.map(i=>({...i,_st:'부족'}))].map((i,idx)=>{const ss=calcSS(i.sku_id);const eq=getEqDash(i.sku_id);const r=ss>0?(eq/ss*100).toFixed(0):0;
        const moq=S.cfg.moq[i.sku_id]||0;const reorder=calcReorder(i.sku_id,eq);
        const isNone=i._st==='없음';
        return`<tr class="clickable alert-row" onclick="openSkuCalc('${i.sku_id}')"><td style="color:var(--tx2);font-size:10px">${idx+1}</td>
        <td><span class="tg ${isNone?'tg-r':'tg-y'}">${i._st}</span></td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.item_name}</td>
        <td class="tr">${fmt(eq)}</td><td class="tr" style="color:var(--yl)">${fmt(ss)}</td>
        <td class="tr" style="color:var(--ac2)">${moq||'-'}</td>
        <td class="tr" style="color:var(--rd);font-weight:600">${reorder>0?fmt(reorder):'-'}</td>
        <td><span class="tg ${r<50?'tg-r':'tg-y'}">${r}%</span></td></tr>`}).join('')}
      ${(cntLow2+cntNoStock2)===0?'<tr><td colspan="8" class="tc" style="color:var(--tx2)">부족 품목 없음</td></tr>':''}</tbody></table></div></div>
  </div>
  <div class="g2">
    <div class="pn" id="dash-excess" style="border-color:var(--or)"><div class="pt" style="color:var(--or)">과다재고 경고 <span class="badge" style="background:var(--or)">${excessItems.length}</span><button class="xlsx-btn" onclick="exportTableCSV(this,'과다재고경고')">📥 엑셀</button></div>
      <p style="font-size:10px;color:var(--tx2);margin-bottom:8px">월평균 출고 대비 6개월분 이상 보유 중인 품목</p>
      <div class="st" style="max-height:500px"><table>
        <thead><tr><th>#</th><th>품목</th><th class="tr">현재고</th><th class="tr">월평균출고</th><th class="tr">보유월수</th><th class="tr">재고금액</th></tr></thead>
        <tbody>${excessItems.map(i=>({...i,eq_now:getEqDash(i.sku_id),ea_now:mio[i.sku_id]&&mio[i.sku_id][lastMk]?mio[i.sku_id][lastMk].ea||0:i.amount||0})).sort((a,b)=>(b.ea_now||0)-(a.ea_now||0)).map((i,idx)=>{
          const avg=monthlyAvgOut(i.sku_id);const months=avg>0?(i.eq_now/avg).toFixed(1):'∞';
          return`<tr class="clickable" onclick="openSkuCalc('${i.sku_id}')">
            <td style="color:var(--tx2);font-size:10px">${idx+1}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.item_name}</td>
            <td class="tr">${fmt(i.eq_now)}</td><td class="tr">${avg>0?avg.toFixed(1):'-'}</td>
            <td class="tr" style="color:var(--or);font-weight:600">${months}개월</td>
            <td class="tr">${fmtM(i.ea_now)}</td></tr>`}).join('')}
        ${excessItems.length===0?'<tr><td colspan="6" class="tc" style="color:var(--tx2)">과다재고 없음</td></tr>':''}</tbody></table></div></div>
    <div class="pn" id="dash-nodemand" style="border-color:var(--pp)"><div class="pt" style="color:var(--pp)">무수요 경고 <span class="badge" style="background:var(--pp)">${noDemandItems.length}</span><button class="xlsx-btn" onclick="exportTableCSV(this,'무수요경고')">📥 엑셀</button></div>
      <p style="font-size:10px;color:var(--tx2);margin-bottom:8px">최근 6개월간 정상출고+타계정출고 이력 없는 재고 보유 품목 (과다재고에 해당하지 않는 품목만)</p>
      <div class="st" style="max-height:500px"><table>
        <thead><tr><th>#</th><th>C/B</th><th>품목</th><th class="tr">현재고</th><th class="tr">재고금액</th><th>판정</th></tr></thead>
        <tbody>${noDemandItems.map(i=>{const io=mio[i.sku_id]||{};return{...i,eq_now:getEqDash(i.sku_id),ea_now:io[lastMk]?io[lastMk].ea||0:i.amount||0}}).sort((a,b)=>(b.ea_now||0)-(a.ea_now||0)).map((i,idx)=>{
          const t=getSkuType(i.sku_id);const hasHist=(i.y25_io&&(i.y25_io.on||i.y25_io.in||i.y25_io.ot))?true:false;
          return`<tr class="clickable" onclick="openSkuCalc('${i.sku_id}')">
            <td style="color:var(--tx2);font-size:10px">${idx+1}</td>
            <td><span class="tg ${t.includes('C')?'tg-b':'tg-c'}">${t.includes('C')?'C':'B'}</span></td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i.item_name}</td>
            <td class="tr">${fmt(i.eq_now)}</td><td class="tr">${fmtM(i.ea_now)}</td>
            <td><span class="tg ${hasHist?'tg-y':'tg-r'}">${hasHist?'처분검토':'즉시처분'}</span></td></tr>`}).join('')}
        ${noDemandItems.length===0?'<tr><td colspan="6" class="tc" style="color:var(--tx2)">무수요 품목 없음</td></tr>':''}</tbody></table></div></div>
  </div>
  <div class="pn" style="margin-bottom:16px"><div class="pt">재고 경고 추이 <span class="badge">${yr}년</span></div><div class="cc"><canvas id="cDashAlert" aria-label="재고 경고 추이 차트" role="img"></canvas></div></div>
  <div class="pn"><div class="pt">재고 회전율 추이 <span class="badge">${yr}년</span></div><div class="cc"><canvas id="cTurnover" aria-label="재고 회전율 추이 차트" role="img"></canvas></div></div>
  <div class="g2">
    <div class="pn"><div class="pt">제품(C) 대분류별 출고추이 <span class="badge">${yr}년</span></div><div class="cc" style="height:280px"><canvas id="cCatC" aria-label="제품 대분류별 출고추이 차트" role="img"></canvas></div>
      <div class="st" style="max-height:200px;margin-top:10px"><table><thead><tr><th>대분류</th>${selMsForCat.map(m=>'<th class="tr">'+m.slice(5)+'월</th>').join('')}<th class="tr" style="font-weight:700">합계</th></tr></thead>
      <tbody>${Object.entries(C_CATS).filter(([c])=>(cOut[c]||{}).total>0).map(([c,nm])=>'<tr onclick="openCatDetail(\''+c+'\')" class="clickable"><td><span class="tg tg-b">'+nm+'</span></td>'+selMsForCat.map(m=>'<td class="tr">'+(cOut[c].monthly[m]?fmt(cOut[c].monthly[m]):'-')+'</td>').join('')+'<td class="tr" style="font-weight:600">'+fmt(cOut[c].total)+'</td></tr>').join('')}
      <tr style="font-weight:700;border-top:2px solid var(--bd)"><td>합계</td>${selMsForCat.map(m=>'<td class="tr">'+fmt(Object.entries(C_CATS).reduce((s,[c])=>s+((cOut[c]||{}).monthly||{})[m]||0,0))+'</td>').join('')}<td class="tr">${fmt(Object.entries(C_CATS).reduce((s,[c])=>s+((cOut[c]||{}).total||0),0))}</td></tr></tbody></table></div>

      <tbody>${Object.entries(B_CATS).filter(([c])=>(bOut[c]||{}).total>0).sort((a,b)=>(bOut[b[0]]||{}).total-(bOut[a[0]]||{}).total).map(([c,nm])=>'<tr onclick="openCatDetail(\''+c+'\')" class="clickable"><td><span class="tg tg-c">'+nm+'</span></td>'+selMsForCat.map(m=>'<td class="tr">'+(bOut[c].monthly[m]?fmt(bOut[c].monthly[m]):'-')+'</td>').join('')+'<td class="tr" style="font-weight:600">'+fmt(bOut[c].total)+'</td></tr>').join('')}
      <tr style="font-weight:700;border-top:2px solid var(--bd)"><td>합계</td>${selMsForCat.map(m=>'<td class="tr">'+fmt(Object.entries(B_CATS).reduce((s,[c])=>s+((bOut[c]||{}).monthly||{})[m]||0,0))+'</td>').join('')}<td class="tr">${fmt(Object.entries(B_CATS).reduce((s,[c])=>s+((bOut[c]||{}).total||0),0))}</td></tr></tbody></table></div>

// ═══════════════ INVENTORY ═══════════════
function pgInv(){
  // 재고 현황은 원재료(B-) 전용. 완제품(C-)은 BOM 페이지에서 관리.
  let items=D.inv.filter(i=>(i.qty!==0||i.amount!==0)&&i.sku_id.startsWith('B-'));
  const yr=S.selYear;
  const lastMk=(()=>{
    if(S.selMonth==='all') return yr==='2025'?'2025-12':M26_DATA[M26_DATA.length-1];
    if(S.selMonth.startsWith('Q')){const qm=getQuarterMonths(S.selMonth,yr);const dm=qm.filter(m=>hasData(m));return dm.length>0?dm[dm.length-1]:M26_DATA[M26_DATA.length-1]}
    const mk=yr+'-'+S.selMonth;return hasData(mk)?mk:(yr==='2026'?M26_DATA[M26_DATA.length-1]:'2025-12');
  })();
  const getEq=sku=>{return mio[sku]&&mio[sku][lastMk]?mio[sku][lastMk].eq||0:0};
  // 전월 재고 (선택월 직전 월 기말)
  const _allMs=[...M25,...M26_DATA];
  const _lmIdx=_allMs.indexOf(lastMk);
  const prevMk=_lmIdx>0?_allMs[_lmIdx-1]:null;

  // Column-based filter
  if(S.invFilterCol!=='all'&&S.invFilterVal!=='all'){

      if(S.invFilterCol==='cb'){const t=getSkuType(i.sku_id);return S.invFilterVal==='C'?t.includes('C'):S.invFilterVal==='B'?t.includes('B'):true}

        const ss=calcSS(i.sku_id);const eq=getEq(i.sku_id);const ratio=ss>0?eq/ss:999;
        let st='정상';if(eq===0)st='재고없음';else if(ratio<.5)st='긴급';else if(ratio<1)st='부족';
        if(S.invFilterVal==='부족합계')return st==='재고없음'||st==='긴급'||st==='부족';
        return st===S.invFilterVal;
      }
      return true;
    });

  if(S.search){const q=S.search.toLowerCase();items=items.filter(i=>i.item_name.toLowerCase().includes(q)||i.sku_id.toLowerCase().includes(q))}
  // Sort
  const invGetter=(item,col)=>{
    if(col==='type')return getSkuType(item.sku_id);
    if(col==='cat'){const c=getSkuCat(item.sku_id);return({...C_CATS,...B_CATS})[c]||c}
    if(col==='sku')return item.sku_id;
    if(col==='name')return item.item_name;

    if(col==='ss')return calcSS(item.sku_id);

    if(col==='out'){const io2=S.selYear==='2025'?(item.y25_io||{}):(item.y26_io||{});return io2.on||0}
    if(col==='other'){const io2=S.selYear==='2025'?(item.y25_io||{}):(item.y26_io||{});return io2.ot||0}
    return 0;
  };

  // 기간별 입출고 집계 — 원재료(B-) 전용 (재고현황 페이지는 B- 만 다룸)

      <th>상태</th></tr></thead>
    <tbody>${items.slice(0,200).map(i=>{
      const ss=calcSS(i.sku_id),t=getSkuType(i.sku_id);const iCat=getSkuCat(i.sku_id);const iCatNm=({...C_CATS,...B_CATS})[iCat]||iCat;
      const moq=S.cfg.moq[i.sku_id]||0;

      const eq=mio[i.sku_id]&&mio[i.sku_id][lastMk]?mio[i.sku_id][lastMk].eq:i.qty;
      const ratio=ss>0?eq/ss:999;
      let st='정상',sc='tg-g';if(eq===0){st='재고없음';sc='tg-p'}else if(ratio<.5){st='긴급';sc='tg-r'}else if(ratio<1){st='부족';sc='tg-y'}
      const io=yr==='2025'?(i.y25_io||{}):(i.y26_io||{});
      const meq=monthEnd?getMonthEndQty(i.sku_id,monthEnd.mk):null;
      const reorder=calcReorder(i.sku_id,eq);
      return`<tr class="clickable${reorder>0&&S.cfg.moqAlert?' alert-row':''}" onclick="openHistory('${i.sku_id}')">
        <td><span class="tg ${t.includes('C')?'tg-b':'tg-c'}">${t.includes('C')?'C':'B'}</span></td>

        <td class="tr" style="color:var(--yl);cursor:pointer" onclick="event.stopPropagation();editSS('${i.sku_id}',${ss})" title="클릭하여 안전재고 수정">${fmt(ss)}${isOverride?' ✏️':''}</td>
        <td class="tr" style="color:var(--ac2);cursor:pointer" onclick="event.stopPropagation();editMOQ('${i.sku_id}')" title="클릭하여 MOQ 수정">${moq||'-'}</td>
        <td class="tr">${fmt(i.unit_cost)}</td>
        <td class="tr">${fmtM(i.amount>0?i.amount:0)}</td>
        <td class="tr" style="color:var(--gn)">${(io.in||io.iq)?fmt(io.in||io.iq):'-'}</td>
        <td class="tr" style="color:var(--pp)">${io.on?fmt(io.on):'-'}</td>
        <td class="tr" style="color:var(--or)">${io.ot?fmt(io.ot):'-'}</td>
        <td><span class="tg ${sc}">${st}${reorder>0?' ('+fmt(reorder)+')':''}</span></td></tr>`}).join('')}</tbody></table></div></div>
  <div style="font-size:10px;color:var(--tx2);margin-top:8px">* 행 클릭→입출고 이력 | 안전재고 셀 클릭→수치 조정 (당월 포함 최근 ${getSSRefMonths().length}개월 평균×${S.cfg.ssMonths}개월, 기준: ${getSSRefMonths().map(m=>m.slice(5)+'월').join(',')}) | MOQ 셀 클릭→최소발주수량 설정 | 빨간 행=발주필요 (괄호 안=발주권장수량, MOQ 배수) | 컬럼 헤더 클릭→정렬</div>`;

function pvSortClick(col){if(!S.priceVarSort)S.priceVarSort={col:'chgPct',dir:'desc'};if(S.priceVarSort.col===col)S.priceVarSort.dir=S.priceVarSort.dir==='asc'?'desc':'asc';else S.priceVarSort={col:col,dir:'desc'};S.priceVarSku=null;render()}
// ═══════════════ BOM ═══════════════
function bomSortClick(col){if(S.bomSort.col===col)S.bomSort.dir=S.bomSort.dir==='asc'?'desc':'asc';else{S.bomSort={col,dir:'desc'}};render()}
// ══════════════════════════════════════════
// ███  원가 분석 탭  ███
// ══════════════════════════════════════════
function costColor4(r){return r<=0?'var(--tx2)':r>=90?'#dc2626':r>=70?'#ca8a04':r>=50?'#15803d':'#2563eb'}
function costLabel4(r){return r<=0?'-':r>=90?'위험':r>=70?'주의':r>=50?'양호':'고마진'}
function costBg4(r){return r<=0?'transparent':r>=90?'rgba(220,38,38,.08)':r>=70?'rgba(234,179,8,.06)':r>=50?'rgba(21,128,61,.04)':'rgba(37,99,235,.04)'}
function pgCost(){
  // ── 월별 기준 설정 ──
  const cm=S.costMonth;
  const cmLbl=cm==='current'?'현재(누적)':cm.slice(2,4)+'.'+cm.slice(5)+'월';
  // 데이터 수집: C- 완제품 중 BOM 있는 것
  const parents=new Set(D.bom.map(b=>b.parent_sku));
  const allPur=[...(D.purch25||[]),...(D.purch26||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const allItems=[];
  parents.forEach(sku=>{
    if(S.bomDisc[sku])return;
    const inv=D.inv.find(i=>i.sku_id===sku);
    if(!inv)return;
    // ── 월별 원가 (수불부 기말단가 or 입고단가) ──
    // 우선순위: ①해당월 기말단가(ea/eq) → ②해당월 입고단가(ia/iq) → ③직전월 기말단가(역추적)
    // C- 완제품은 mio.eq=0이 기본이므로 BOM 자재비로 fallback (별도 로직 아래에서)
    const io=mio[sku];
    function _monthUC(targetMk){
      if(!io||!targetMk)return{uc:0,src:''};
      const r=io[targetMk];
      // ① 해당월 기말단가 ② 입고단가 ③ 출고단가 (C- 완제품은 eq=0이어도 oa/oq가 있음)
      if(r&&r.eq>0&&r.ea>0)return{uc:Math.round(r.ea/r.eq),src:targetMk.slice(5)+'월 기말'};
      if(r&&r.iq>0&&r.ia>0)return{uc:Math.round(r.ia/r.iq),src:targetMk.slice(5)+'월 입고'};
      if(r&&r.oq>0&&r.oa>0)return{uc:Math.round(r.oa/r.oq),src:targetMk.slice(5)+'월 출고'};
      // ④ 직전월 역추적 (같은 우선순위)
      const idx=DATA_MONTHS.indexOf(targetMk);
      for(let j=idx-1;j>=0;j--){
        const pm=DATA_MONTHS[j],rr=io[pm];
        if(!rr)continue;
        if(rr.eq>0&&rr.ea>0)return{uc:Math.round(rr.ea/rr.eq),src:pm.slice(5)+'월 기말'};
        if(rr.iq>0&&rr.ia>0)return{uc:Math.round(rr.ia/rr.iq),src:pm.slice(5)+'월 입고'};
        if(rr.oq>0&&rr.oa>0)return{uc:Math.round(rr.oa/rr.oq),src:pm.slice(5)+'월 출고'};
      }
      return{uc:0,src:''};
    }
    let uc=0,ucSrc='';
    if(cm==='current'){
      // current 모드에서는 최신월부터 역추적
      const rMs=[...DATA_MONTHS].reverse();
      for(const mk of rMs){const r=_monthUC(mk);if(r.uc>0){uc=r.uc;ucSrc=r.src;break}}
      if(uc<=0&&inv.unit_cost>0){uc=inv.unit_cost;ucSrc='현재'}
    }else{
      const r=_monthUC(cm);uc=r.uc;ucSrc=r.src;
    }
    // ── 월별 판매 (sales_tx 기반) ──
    // current 모드: '마지막 판매월'(일시불 존재한 가장 최근 월) 기준 avgSP 사용
    // 특정월 모드: 해당 월 avgSP 사용
    const tx=D.sales_tx?D.sales_tx.filter(t=>t.sku_id===sku):[];
    let paidQty=0,paidAmt=0,rentalQty=0,lastPaidMonth='';
    if(cm==='current'){
      // 누적 렌탈/일시불 수량 (KPI 집계용)
      tx.forEach(t=>{if((t.amt||0)>0){paidQty+=(t.qty||0);paidAmt+=(t.amt||0)}else if((t.qty||0)>0)rentalQty+=(t.qty||0)});
      // 마지막 일시불 판매월 찾기 (최신→과거 순)
      const rMs=[...DATA_MONTHS].reverse();
      for(const mk of rMs){
        const mPrefix=mk.replace('-','/');
        const mTx=tx.filter(t=>(t.date||'').startsWith(mPrefix)&&(t.amt||0)>0);
        if(mTx.length>0){
          const mQ=mTx.reduce((s,t)=>s+(t.qty||0),0);
          const mA=mTx.reduce((s,t)=>s+(t.amt||0),0);
          if(mQ>0){paidQty=mQ;paidAmt=mA;lastPaidMonth=mk;break}
        }
      }
    }else{
      const cmPrefix=cm.replace('-','/');
      tx.filter(t=>(t.date||'').startsWith(cmPrefix)).forEach(t=>{
        if((t.amt||0)>0){paidQty+=(t.qty||0);paidAmt+=(t.amt||0)}else if((t.qty||0)>0)rentalQty+=(t.qty||0)
      });
      lastPaidMonth=cm;
    }
    const avgSP=paidQty>0?Math.round(paidAmt/paidQty):0;
    const totalQty=paidQty+rentalQty;
    // BOM 자재비 — 해당 월(또는 current 기준 최신 유효월) 자재 단가로 재계산
    // 우선순위: ①해당월 자재 기말단가 → ②해당월 자재 입고단가 → ③해당월 이전 자재 매입단가(최근) → ④재고 최신가
    const bomRefMk=cm==='current'?DATA_MONTHS[DATA_MONTHS.length-1]:cm;
    const children=D.bom.filter(b=>b.parent_sku===sku);
    let bomCost=0;
    children.forEach(c=>{
      let p=0;
      // ① 해당월 자재 수불부 기말단가
      const cio=mio[c.child_sku];
      if(cio&&cio[bomRefMk]){
        const r=cio[bomRefMk];
        if(r.eq>0&&r.ea>0)p=Math.round(r.ea/r.eq);
        else if(r.iq>0&&r.ia>0)p=Math.round(r.ia/r.iq);
      }
      // ② 역추적 (직전월 기말 → 입고)
      if(p<=0&&cio){
        const idx=DATA_MONTHS.indexOf(bomRefMk);
        for(let j=idx-1;j>=0;j--){
          const pm=DATA_MONTHS[j],rr=cio[pm];
          if(!rr)continue;
          if(rr.eq>0&&rr.ea>0){p=Math.round(rr.ea/rr.eq);break}
          if(rr.iq>0&&rr.ia>0){p=Math.round(rr.ia/rr.iq);break}
        }
      }
      // ③ 해당월 이전 매입가 (allPur: date 내림차순)
      if(p<=0){
        const cmPrefix=bomRefMk.replace('-','/');
        const pur=allPur.find(x=>x.sku_id===c.child_sku&&x.price>0&&(x.date||'')<=cmPrefix+'/31');
        if(pur)p=pur.price;
      }
      // ④ 최종 fallback
      if(p<=0){
        const pur=allPur.find(x=>x.sku_id===c.child_sku&&x.price>0);
        if(pur)p=pur.price;
        else{const ci=D.inv.find(i=>i.sku_id===c.child_sku);if(ci&&ci.qty>0&&ci.amount>0)p=Math.round(ci.amount/ci.qty)}
      }
      bomCost+=p*c.qty;
    });
    // 원가: B-/C- 모두 수불부 기준 (fallback: 기말 → 입고 → 출고 → 직전월 역추적)
    // BOM 자재비는 참고용 컬럼(bomCost/bomCR)으로 별도 표시
    const cr=avgSP>0&&uc>0?+(uc/avgSP*100).toFixed(1):0;
    const bomCR=avgSP>0&&bomCost>0?+(bomCost/avgSP*100).toFixed(1):0;
    const margin=cr>0?(100-cr).toFixed(1):null;
    // 월별 원가 추이 — 수불부 단가 (B-/C- 공통, _monthUC 재사용)
    const monthlyUC=DATA_MONTHS.map(m=>_monthUC(m).uc);
    // 월별 원가율 추이
    const monthlyCR=DATA_MONTHS.map((m,mi)=>{
      const mUc=monthlyUC[mi];if(mUc<=0)return 0;
      const mPrefix=m.replace('-','/');const mTx=D.sales_tx?D.sales_tx.filter(t=>t.sku_id===sku&&(t.date||'').startsWith(mPrefix)&&(t.amt||0)>0):[];
      const mQ=mTx.reduce((s,t)=>s+(t.qty||0),0);const mA=mTx.reduce((s,t)=>s+(t.amt||0),0);
      const mSP=mQ>0?Math.round(mA/mQ):0;
      return mSP>0?+(mUc/mSP*100).toFixed(1):0;
    });
    allItems.push({sku,name:inv.item_name||'',uc,ucSrc,bomCost,avgSP,cr,bomCR,margin,lastPaidMonth,
      paidQty,rentalQty,totalQty,paidAmt,matCnt:children.length,monthlyUC,monthlyCR});
  });

  // 필터
  let items=allItems;
  if(S.costFilter==='hasData')items=items.filter(i=>i.cr>0);
  else if(S.costFilter==='noData')items=items.filter(i=>i.cr<=0);
  else if(S.costFilter==='rental')items=items.filter(i=>i.rentalQty>0);
  if(S.costBand==='high')items=items.filter(i=>i.cr>=90);
  else if(S.costBand==='mid')items=items.filter(i=>i.cr>=70&&i.cr<90);
  else if(S.costBand==='ok')items=items.filter(i=>i.cr>=50&&i.cr<70);
  else if(S.costBand==='good')items=items.filter(i=>i.cr>0&&i.cr<50);
  if(S.search){const q=S.search.toLowerCase();items=items.filter(i=>i.name.toLowerCase().includes(q)||i.sku.toLowerCase().includes(q))}
  // 정렬
  const sc=S.costSort.col,sd=S.costSort.dir==='asc'?1:-1;
  items.sort((a,b)=>{let va,vb;if(sc==='name'){va=a.name;vb=b.name;return va<vb?-sd:va>vb?sd:0}if(sc==='costRatio'){va=a.cr;vb=b.cr}else if(sc==='bomCR'){va=a.bomCR;vb=b.bomCR}else if(sc==='avgSP'){va=a.avgSP;vb=b.avgSP}else if(sc==='uc'){va=a.uc;vb=b.uc}else if(sc==='margin'){va=parseFloat(a.margin)||0;vb=parseFloat(b.margin)||0}else if(sc==='rental'){va=a.rentalQty;vb=b.rentalQty}else if(sc==='paidQty'){va=a.paidQty;vb=b.paidQty}else{va=a.cr;vb=b.cr}return(va-vb)*sd});

  // KPI 집계
  const withData=allItems.filter(i=>i.cr>0);
  const avgCR=withData.length>0?+(withData.reduce((s,i)=>s+i.cr,0)/withData.length).toFixed(1):0;
  const b_high=allItems.filter(i=>i.cr>=90).length;
  const b_mid=allItems.filter(i=>i.cr>=70&&i.cr<90).length;
  const b_ok=allItems.filter(i=>i.cr>=50&&i.cr<70).length;
  const b_good=allItems.filter(i=>i.cr>0&&i.cr<50).length;
  const totalRental=allItems.reduce((s,i)=>s+i.rentalQty,0);
  const totalPaid=allItems.reduce((s,i)=>s+i.paidQty,0);
  function csi(col){return S.costSort.col===col?(S.costSort.dir==='asc'?'▲':'▼'):''}

  // ── P&L 기준 원가율 (손익계산서 실측치) ──
  // 손익계산서 파일 비버웍스 N월 손익계산서.xlsx 에서 직접 파싱한 값
  // 상품매출원가 = 당기매입액 (기초/기말재고 공란)
  // 제품매출원가 = 당기매입액 − 타계정대체 (기초/기말재고 공란)
  // PL_DATA: Google Sheets에서 로딩된 데이터 우선, 없으면 하드코딩 폴백
  const PL_DATA=window._PL_DATA_FROM_SHEETS||{
    '2026-01':{b:{rev:68957909,cogs:51594755},c:{rev:921613636,cogs:701047883,purch:733222103,otherAcct:32174220}},
    '2026-02':{b:{rev:94043091,cogs:44512174},c:{rev:601441000,cogs:514668241,purch:561602711,otherAcct:46934470}},
    '2026-03':{b:{rev:62655600,cogs:49326403},c:{rev:449487364,cogs:427198629,purch:471954887,otherAcct:44756258}}
  };
  const _plMonths=cm==='current'?Object.keys(PL_DATA):[cm];
  function _plAgg(key){

      if((t.amt||0)>0)r+=(t.amt||0);

    return Math.round(r);
  }
  const dashRevB=_dashRev('B-');

  <div class="kr" style="margin-bottom:16px">

    <div class="kc"><div class="lb">평균 원가율</div><div class="vl" style="font-size:20px;color:${costColor4(avgCR)}">${avgCR}%</div><div class="sb">${costLabel4(avgCR)}</div></div>
    <div class="kc" style="cursor:pointer" onclick="S.costBand=S.costBand==='high'?'all':'high';render();setTimeout(()=>{const el=document.getElementById('costDetailTbl');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},80)"><div class="lb">🔴 위험 (90%↑)</div><div class="vl" style="font-size:20px;color:#dc2626">${b_high}</div><div class="sb">원가 초과 위험</div></div>
    <div class="kc" style="cursor:pointer" onclick="S.costBand=S.costBand==='mid'?'all':'mid';render();setTimeout(()=>{const el=document.getElementById('costDetailTbl');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},80)"><div class="lb">🟡 주의 (70~90%)</div><div class="vl" style="font-size:20px;color:#ca8a04">${b_mid}</div><div class="sb">마진 압박</div></div>
    <div class="kc" style="cursor:pointer" onclick="S.costBand=S.costBand==='ok'?'all':'ok';render();setTimeout(()=>{const el=document.getElementById('costDetailTbl');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},80)"><div class="lb">🟢 양호 (50~70%)</div><div class="vl" style="font-size:20px;color:#15803d">${b_ok}</div><div class="sb">정상 마진</div></div>
    <div class="kc" style="cursor:pointer" onclick="S.costBand=S.costBand==='good'?'all':'good';render();setTimeout(()=>{const el=document.getElementById('costDetailTbl');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},80)"><div class="lb">🔵 고마진 (~50%)</div><div class="vl" style="font-size:20px;color:#2563eb">${b_good}</div><div class="sb">우수</div></div>
  </div>
  ${plB.hasData?`<div class="kr" style="margin-bottom:4px">

      <div class="sb" style="font-size:10px">원가 ${fmtM(plB.cogs)} ÷ 매출 ${fmtM(plB.rev)}</div>

    </div>
    <div class="kc" style="background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(16,185,129,.02));border:1px solid rgba(16,185,129,.3)">
      <div class="lb">📋 손익 원가율 · 제품매출</div>
      <div class="vl" style="font-size:22px;color:${costColor4(plC.cr)}">${plC.cr}%</div>
      <div class="sb" style="font-size:10px">원가 ${fmtM(plC.cogs)} ÷ 매출 ${fmtM(plC.rev)}</div>
      <div style="font-size:9px;color:var(--tx2);margin-top:2px">대시보드 C- 매출: ${fmtM(dashRevC)} ${Math.abs(dashRevC-plC.rev)/plC.rev<0.03?'<span style="color:var(--gn)">✓</span>':'<span style="color:var(--yl)">Δ'+fmtM(dashRevC-plC.rev)+'</span>'}</div>
    </div>

      <div class="sb" style="font-size:10px">원가 ${fmtM(plB.cogs+plC.cogs)} ÷ 매출 ${fmtM(plB.rev+plC.rev)}</div>
      <div style="font-size:9px;color:var(--tx2);margin-top:2px">매출총이익 ${fmtM(plB.rev+plC.rev-plB.cogs-plC.cogs)}</div>

      <div style="font-size:9px;color:var(--tx2);line-height:1.4;margin-top:3px">
        상품: 당기매입 그대로<br>
        제품: 당기매입 − 타계정대체<br>
        (기초/기말재고 공란)<br>
        <strong style="color:var(--ac)">월별 실측치 직접 대사</strong>
      </div>
    </div>
  </div>
  <div style="font-size:9px;color:var(--tx2);margin:-2px 4px 12px 4px">* <strong>손익 원가율</strong>은 비버웍스 월별 손익계산서(계정코드 4019/4049 매출, 4519/4529 매출원가)에서 직접 파싱한 실측치입니다. ${cm==='current'?'2026년 1~3월 누적':cm.slice(0,4)+'년 '+parseInt(cm.slice(5))+'월'} 기준. 위 <strong>평균 원가율</strong>(대시보드 SKU 단순평균)과 비교 시 구조적 차이: ① 분자가 수불부 기말단가 vs 당기매입액, ② 분모가 일시불 판매단가 vs 회계매출액, ③ 단순평균 vs 매출액가중. 서비스매출/서비스매출원가는 SCM 대상 외이므로 제외.</div>`:''}
  </div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
    <div class="pn" style="flex:1.2;min-width:320px;padding:12px 16px">
      <div class="pt">원가율 분포 <span class="badge">${withData.length}종</span> <span class="badge" style="background:var(--ac2)">${cmLbl}</span></div>

      <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
        <div style="flex:0 0 120px;position:relative"><canvas id="cRentalPie" aria-label="판매유형 비율"></canvas></div>
        <div style="flex:1;display:flex;flex-direction:column;gap:10px">
          <div style="padding:8px 12px;border-radius:6px;background:rgba(37,99,235,.06)">
            <div style="font-size:10px;color:var(--tx2)">🔵 일시불판매</div>
            <div style="font-size:18px;font-weight:700;color:#2563eb">${fmt(totalPaid)}<span style="font-size:11px;font-weight:400">건</span></div>
          </div>
          <div style="padding:8px 12px;border-radius:6px;background:rgba(234,179,8,.06)">
            <div style="font-size:10px;color:var(--tx2)">🟡 구독/렌탈</div>
            <div style="font-size:18px;font-weight:700;color:#ca8a04">${fmt(totalRental)}<span style="font-size:11px;font-weight:400">건</span></div>
          </div>
          <div style="padding:8px 12px;border-radius:6px;background:var(--bg2)">
            <div style="font-size:10px;color:var(--tx2)">렌탈 비중</div>
            <div style="font-size:18px;font-weight:700;color:${totalRental/(totalPaid+totalRental||1)>0.2?'var(--rd)':'var(--tx2)'}">${totalPaid+totalRental>0?((totalRental/(totalPaid+totalRental))*100).toFixed(1):'0'}<span style="font-size:11px;font-weight:400">%</span></div>
          </div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
    <div class="pn" style="flex:1;min-width:320px;padding:12px 16px">
      <div class="pt">월별 평균 원가율 추이 <span style="font-size:9px;color:var(--tx2);font-weight:400">· 각 월 판매단가 기준</span></div>
      <div style="position:relative"><canvas id="cCostTrend" aria-label="월별 원가율 추이"></canvas></div>
      <div style="font-size:9px;color:var(--tx2);margin-top:4px;padding:0 4px">* 각 월의 일시불 판매단가(월별 평균)를 분모로, 기말단가 또는 최근 수불부 단가를 분자로 계산. 해당 월에 일시불 판매가 없는 SKU는 제외.</div>
    </div>
  </div>

  ${(()=>{
    const totalAllAmt=allItems.reduce((s,i)=>s+(i.paidAmt||0),0);
    const rs=S.riskSort,rsDir=rs.dir==='asc'?1:-1;
    const riskList=[...withData].filter(i=>i.cr>=90).sort((a,b)=>{
      let va,vb;
      if(rs.col==='name'){va=a.name||'';vb=b.name||'';return va<vb?-rsDir:va>vb?rsDir:0}
      if(rs.col==='sku'){va=a.sku;vb=b.sku;return va<vb?-rsDir:va>vb?rsDir:0}
      if(rs.col==='uc'){va=a.uc;vb=b.uc}

      else if(rs.col==='cr'){va=a.cr;vb=b.cr}

      else if(rs.col==='share'){va=a.paidAmt||0;vb=b.paidAmt||0}
      else{va=a.cr;vb=b.cr}
      return(va-vb)*rsDir;
    });

    <tbody>${riskList.map((i,idx)=>{

  </div>`;
  })()}

function pgBom(){
  // C-* 접두어 코드만 사용 (C로 시작하는 레거시 단순 C 코드 및 기타 접두어 코드는 모두 미사용)
  const BOM_EXCLUDE=new Set(['C-KI220CDNA-WG14']);
  const isValidParent=sku=>sku&&sku.toUpperCase().startsWith('C-')&&!BOM_EXCLUDE.has(sku);
  const bMap={};D.bom.forEach(b=>{if(!isValidParent(b.parent_sku))return;if(!bMap[b.parent_sku])bMap[b.parent_sku]={nm:b.parent_name,ch:[]};bMap[b.parent_sku].ch.push(b)});
  const usedMats=new Set(D.bom.filter(b=>isValidParent(b.parent_sku)).map(b=>b.child_sku));
  const allBMats=D.inv.filter(i=>i.sku_id.startsWith('B-'));
  const unusedMats=allBMats.filter(i=>!usedMats.has(i.sku_id));

  // 월별 생산가능 계산용: 기준월 선택
  // bomMonth='current' 면 현재고 / 'YYYY-MM' 이면 해당월말 재고(eq)
  // bomMonth: 'current', '2025-01', ..., '2026-03' 등 모두 허용
  const bmMo=S.bomMonth||'current';
  const getBomQ=sku=>{
    if(bmMo==='current'){const inv=D.inv.find(i=>i.sku_id===sku);return inv?inv.qty:0}
    return mio[sku]&&mio[sku][bmMo]?mio[sku][bmMo].eq:0;
  };
  // 모든 월말별 parent 생산가능수량 맵: prodCapByMonth[parent_sku] = {mk: cap, ...}
  const monthsForProd=[...M25,...M26_DATA];
  const prodCapByMonth={};
  Object.entries(bMap).forEach(([psku,d])=>{
    prodCapByMonth[psku]={};
    monthsForProd.forEach(mk=>{
      let minCap=Infinity;
      d.ch.forEach(c=>{
        if(!(c.qty>0))return;// 소요량 0 자재는 병목 계산에서 제외
        const eq=mio[c.child_sku]&&mio[c.child_sku][mk]?mio[c.child_sku][mk].eq:0;
        const cap=Math.floor(eq/c.qty);
        if(cap<minCap)minCap=cap;
      });
      prodCapByMonth[psku][mk]=isFinite(minCap)?minCap:0;
    });
    // 현재 기준 (가장 부족한 부자재 기준)
    let curMin=Infinity;
    d.ch.forEach(c=>{
      if(!(c.qty>0))return;
      const inv=D.inv.find(i=>i.sku_id===c.child_sku);const q=inv?inv.qty:0;
      const cap=Math.floor(q/c.qty);
      if(cap<curMin)curMin=cap;
    });
    prodCapByMonth[psku].current=isFinite(curMin)?curMin:0;
  });
  // BOM별 자재 상태 집계 (안전재고 기준 = 평균출고 × ssMonths개월)
  // - 자재 없음(out): 재고 = 0
  // - 자재 부족(short): 0 < 재고 < 안전재고
  // - 충분(ok): 재고 >= 안전재고
  const bomOutMats=new Set();const bomShortMats=new Set();
  const parentShortInfo={};// parent_sku -> {outCnt, shortCnt, okCnt, totalMat, prodCap}
  Object.entries(bMap).forEach(([psku,d])=>{
    let oc=0,sc=0,ok=0;
    d.ch.forEach(c=>{
      const q=getBomQ(c.child_sku);
      const ss=calcSS(c.child_sku);
      if(q<=0){bomOutMats.add(c.child_sku);oc++}
      else if(ss>0&&q<ss){bomShortMats.add(c.child_sku);sc++}
      else ok++;
    });
    // 최종 안전재고는 C- 코드 기준 (판매 기반): 목표 = calcSS(parent)
    const parentSS=calcSS(psku);
    const parentAvgSale=_cSalesAvg(psku);
    const pc=prodCapByMonth[psku][bmMo]||0;
    // C- 기준 상태: 생산가능이 SS 미달이면 부족, 0이면 없음
    let cStatus='ok';
    if(parentSS>0){
      if(pc<=0)cStatus='out';
      else if(pc<parentSS)cStatus='short';
    }else{
      if(pc<=0&&oc>0)cStatus='out';
      else if(sc>0)cStatus='short';
    }
    // 원가율 계산용 (현재 기말단가, 없으면 최근 월 역산)
    const _inv=D.inv.find(i=>i.sku_id===psku);
    let _uc=_inv?_inv.unit_cost||0:0;
    let _ucSrc='현재';
    if(_uc<=0){
      const _io=mio[psku];if(_io){
        const _rMs=[...DATA_MONTHS].reverse();
        for(const _mk of _rMs){const _r=_io[_mk];if(_r&&_r.eq>0&&_r.ea>0){_uc=Math.round(_r.ea/_r.eq);_ucSrc=_mk.slice(5)+'월';break}}
      }
    }
    // 개별 거래(sales_tx) 기반 판매단가 (구독/렌탈 0원 정확 분리)
    const _txInfo=_txSalesInfo(psku);
    const _avgSP=_txInfo.avgSP;
    const _cr=_avgSP>0&&_uc>0?+( _uc/_avgSP*100).toFixed(1):0;
    parentShortInfo[psku]={outCnt:oc,shortCnt:sc,lowCnt:sc,okCnt:ok,totalMat:d.ch.length,prodCap:pc,parentSS,parentAvgSale,cStatus,unitCost:_uc,ucSrc:_ucSrc,avgSellPrice:_avgSP,costRatio:_cr,rentalQty:_txInfo.rentalQty,paidQty:_txInfo.paidQty,totalSalesQty:_txInfo.totalQty};
  });

  // 정렬 적용
  let ps=Object.entries(bMap);
  if(S.search){const q=S.search.toLowerCase();ps=ps.filter(([k,v])=>v.nm.toLowerCase().includes(q)||k.toLowerCase().includes(q))}
  const sc=S.bomSort.col,sd=S.bomSort.dir==='asc'?1:-1;
  ps.sort((a,b)=>{
    let va,vb;
    if(sc==='name'){va=a[1].nm;vb=b[1].nm;return va<vb?-sd:va>vb?sd:0}
    if(sc==='matCnt'){va=a[1].ch.length;vb=b[1].ch.length}
    else if(sc==='outCnt'){va=(parentShortInfo[a[0]]||{}).outCnt||0;vb=(parentShortInfo[b[0]]||{}).outCnt||0}
    else if(sc==='shortCnt'){va=(parentShortInfo[a[0]]||{}).shortCnt||0;vb=(parentShortInfo[b[0]]||{}).shortCnt||0}
    else if(sc==='okCnt'){va=(parentShortInfo[a[0]]||{}).okCnt||0;vb=(parentShortInfo[b[0]]||{}).okCnt||0}
    else if(sc==='prodCap'){va=(parentShortInfo[a[0]]||{}).prodCap||0;vb=(parentShortInfo[b[0]]||{}).prodCap||0}
    else if(sc==='costRatio'){va=(parentShortInfo[a[0]]||{}).costRatio||0;vb=(parentShortInfo[b[0]]||{}).costRatio||0}
    else if(sc==='avgSP'){va=(parentShortInfo[a[0]]||{}).avgSellPrice||0;vb=(parentShortInfo[b[0]]||{}).avgSellPrice||0}
    else if(sc==='lowCnt'){va=(parentShortInfo[a[0]]||{}).lowCnt||0;vb=(parentShortInfo[b[0]]||{}).lowCnt||0}
    else{va=a[1].ch.length;vb=b[1].ch.length}
    return (va-vb)*sd;
  });

  // 필터: KPI 연동 (C- 기준 상태 사용)
  const bf=S.bomFilter;
  if(bf==='out')ps=ps.filter(([k])=>(parentShortInfo[k]||{}).cStatus==='out');
  else if(bf==='short')ps=ps.filter(([k])=>(parentShortInfo[k]||{}).cStatus==='short');
  else if(bf==='low')ps=ps.filter(([k])=>(parentShortInfo[k]||{}).cStatus==='short');
  else if(bf==='shortlow')ps=ps.filter(([k])=>{const s=(parentShortInfo[k]||{}).cStatus;return s==='out'||s==='short'});
  else if(bf==='ok')ps=ps.filter(([k])=>(parentShortInfo[k]||{}).cStatus==='ok');
  else if(bf==='disc')ps=ps.filter(([k])=>!!S.bomDisc[k]);

  const isUsedTab=S.bomTab==='used';

ont-weight:400"> ('+pi.ucSrc+')</span>':''):'-'}</td><td><span class="tg ${stTg}">${stLbl}</span></td></tr>`}).join('')}</tbody></table>
  <div style="font-size:10px;color:var(--tx2);margin-top:6px">* <strong>C-안전재고</strong> = 월평균판매 × ${S.cfg.ssMonths}개월 | <strong>생산가능</strong> = 병목자재 기준 | <strong>SS커버</strong> = 생산가능÷안전재고 | <strong>원가율</strong> = 수불부 기말단가÷평균판매단가 (<span style="color:#2563eb">~50%</span> / <span style="color:#15803d">50~70%</span> / <span style="color:#ca8a04">70~90%</span> / <span style="color:#dc2626">90%↑</span>)</div></div>`
  :`<div class="pn"><div class="pt" style="color:var(--rd)">사용중단 예정 제품 관리 <span class="badge" style="background:var(--rd)">${Object.keys(S.bomDisc).length}종</span><button class="xlsx-btn" onclick="exportTableCSV(this,'BOM_사용중단예정')">📥 엑셀</button></div>
    <p style="font-size:11px;color:var(--tx2);margin-bottom:12px">BOM 등록된 제품 중 향후 사용하지 않을 제품을 관리합니다. 체크하여 사용중단 예정으로 표시하세요.</p>

// ═══════════════ PURCHASE ANALYSIS (구매 분석) ═══════════════
function pgPriceVar(){
  // 전체 구매 데이터 (2025+2026) 합산
  var allPurch=[...(D.purch25||[]),...(D.purch26||[])];
  // 모든 월 수집 후 정렬
  var monthSet=new Set();
  allPurch.forEach(function(r){var m=r.date.substring(0,7).replace('/','-');monthSet.add(m)});
  var ALL_MS=Array.from(monthSet).sort();
  // 품목별 월별 단가 집계
  var priceItems={};
  allPurch.forEach(function(r){
    var m=r.date.substring(0,7).replace('/','-');
    var k=r.sku_id;
    if(!priceItems[k]) priceItems[k]={sku:k,name:r.name,vendor:r.vendor,months:{}};
    if(!priceItems[k].months[m]) priceItems[k].months[m]={qty:0,amt:0,txs:[]};
    priceItems[k].months[m].qty+=r.qty;
    priceItems[k].months[m].amt+=r.amount;
    priceItems[k].months[m].txs.push(r);
  });
  var priceAnalysis=Object.values(priceItems).map(function(item){
    var mPrices=ALL_MS.filter(function(m){return item.months[m]&&item.months[m].qty>0&&item.months[m].amt>0}).map(function(m){
      return{month:m,avgP:Math.round(item.months[m].amt/item.months[m].qty),qty:item.months[m].qty,amt:item.months[m].amt}
    }).filter(function(p){return p.avgP>0});
    if(mPrices.length<2) return null;
    var first=mPrices[0].avgP,last=mPrices[mPrices.length-1].avgP;
    var chgPct=first>0?((last-first)/first*100):0;
    var maxP=Math.max.apply(null,mPrices.map(function(p){return p.avgP}));
    var minP=Math.min.apply(null,mPrices.map(function(p){return p.avgP}));
    var volatility=minP>0?((maxP-minP)/minP*100):0;
    var firstMonth=mPrices[0].month;
    return Object.assign({},item,{mPrices:mPrices,first:first,last:last,chgPct:chgPct,maxP:maxP,minP:minP,volatility:volatility,firstMonth:firstMonth,totalQty:mPrices.reduce(function(s,p){return s+p.qty},0)});
  }).filter(function(x){return x&&x.chgPct!==0&&x.first>0&&x.last>0&&!x.sku.toUpperCase().startsWith('A')});
  var upItems=priceAnalysis.filter(function(i){return i.chgPct>0});
  var downItems=priceAnalysis.filter(function(i){return i.chgPct<0});
  var highVol=priceAnalysis.filter(function(i){return i.volatility>10});
  var totalImpact=priceAnalysis.reduce(function(s,i){
    if(i.mPrices.length>=2){var lastP=i.mPrices[i.mPrices.length-1];return s+(lastP.avgP-i.first)*lastP.qty}return s;
  },0);
  if(!S.priceVarSort) S.priceVarSort={col:'chgPct',dir:'desc'};
  var pvSortCol=S.priceVarSort.col, pvSortDir=S.priceVarSort.dir;
  var sorted=priceAnalysis.sort(function(a,b){
    var va,vb;
    if(pvSortCol==='sku'){va=a.sku;vb=b.sku;return pvSortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}
    if(pvSortCol==='name'){va=a.name;vb=b.name;return pvSortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}
    if(pvSortCol==='firstMonth'){va=a.firstMonth;vb=b.firstMonth;return pvSortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va)}
    if(pvSortCol==='first'){va=a.first;vb=b.first}
    else if(pvSortCol==='last'){va=a.last;vb=b.last}
    else if(pvSortCol==='avgP'){va=a.totalQty>0?a.mPrices.reduce(function(s,p){return s+p.amt},0)/a.totalQty:0;vb=b.totalQty>0?b.mPrices.reduce(function(s,p){return s+p.amt},0)/b.totalQty:0}
    else if(pvSortCol==='chgPct'){va=Math.abs(a.chgPct);vb=Math.abs(b.chgPct)}
    else if(pvSortCol==='range'){va=a.maxP-a.minP;vb=b.maxP-b.minP}
    else if(pvSortCol==='volatility'){va=a.volatility;vb=b.volatility}
    else if(pvSortCol==='totalQty'){va=a.totalQty;vb=b.totalQty}
    else if(pvSortCol==='totalAmt'){va=a.mPrices.reduce(function(s,p){return s+p.amt},0);vb=b.mPrices.reduce(function(s,p){return s+p.amt},0)}
    else{va=Math.abs(a.chgPct);vb=Math.abs(b.chgPct)}
    return pvSortDir==='asc'?va-vb:vb-va;
  });
  // 금액대(단가 기준) 분류 — 평균단가 기준
  var getPriceBand=function(avgP){
    if(avgP<5000)return 'b1';           // 저가 <5천
    if(avgP<30000)return 'b2';          // 중가 5천~3만
    if(avgP<100000)return 'b3';         // 고가 3만~10만
    if(avgP<500000)return 'b4';         // 10~50만
    if(avgP<1000000)return 'b5';        // 50~100만
    return 'b6';                        // 100만 초과
  };
  var bandLabels={b1:'저가 <5천',b2:'중가 5천~3만',b3:'고가 3만~10만',b4:'10~50만',b5:'50~100만',b6:'100만 초과'};
  priceAnalysis.forEach(function(i){
    i.avgPrice=i.totalQty>0?Math.round(i.mPrices.reduce(function(s,p){return s+p.amt},0)/i.totalQty):0;
    i.band=getPriceBand(i.avgPrice);
  });
  var bandCnt={b1:0,b2:0,b3:0,b4:0,b5:0,b6:0};
  priceAnalysis.forEach(function(i){bandCnt[i.band]++});
  var fList=sorted;
  var pf=S.priceVarFilter||'all';
  var pb=S.priceVarBand||'all';
  if(pf==='up')fList=fList.filter(function(i){return i.chgPct>0});
  else if(pf==='down')fList=fList.filter(function(i){return i.chgPct<0});
  else if(pf==='vol')fList=fList.filter(function(i){return i.volatility>10});
  if(pb!=='all')fList=fList.filter(function(i){return i.band===pb});
  // 선택된 품목 상세
  var selSku=S.priceVarSku;
  var selItem=selSku?priceAnalysis.find(function(i){return i.sku===selSku}):null;
  // 품목 상세 HTML
  var detailHtml='';
  if(selItem){
    var itemMs=ALL_MS.filter(function(m){return selItem.months[m]&&selItem.months[m].qty>0&&selItem.months[m].amt>0});
    var selAvgP=selItem.totalQty>0?Math.round(selItem.mPrices.reduce(function(s,p){return s+p.amt},0)/selItem.totalQty):0;
    var detRows=itemMs.map(function(m){
      var d=selItem.months[m];
      if(!d||d.qty===0||d.amt<=0) return '';
      var up=Math.round(d.amt/d.qty);
      var isMax=up===selItem.maxP&&selItem.volatility>10;
      var isMin=up===selItem.minP&&selItem.volatility>10;
      var txDetail=d.txs.map(function(t){
        var tup=t.qty>0?Math.round(t.amount/t.qty):0;
        return '<div style="font-size:10px;color:var(--tx2);padding:1px 0">'
          +t.date.substring(0,10)+' | '+(t.vendor||'-')+' | '+fmt(t.qty)+'개 × '+fmtP(tup)+' = '+fmtM(t.amount)
          +'</div>';
      }).join('');
      return '<tr>'
        +'<td style="font-weight:600">'+m.slice(0,4)+'.'+m.slice(5)+'</td>'
        +'<td class="tr">'+fmt(d.qty)+'</td>'
        +'<td class="tr">'+fmtM(d.amt)+'</td>'
        +'<td class="tr" style="font-weight:700;'+(isMax?'color:var(--rd)':isMin?'color:var(--gn)':'')+'">'+fmtP(up)+'</td>'
        +'<td>'+txDetail+'</td>'
        +'</tr>';
    }).join('');
    detailHtml='<div class="pn" style="border:2px solid var(--ac);margin-bottom:16px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      +'<div class="btn" onclick="S.priceVarSku=null;render()" style="font-size:11px;padding:2px 10px">← 목록으로</div>'

}
function pgPurchase(){
  const yr=S.selYear;
  const allPurch=yr==='2025'?(D.purch25||[]):(D.purch26||[]);
  const allMs=yr==='2025'?M25:M26_DATA;
  const selMs=getSelectedMonths();
  const selSet=new Set(selMs);
  const mLabel=periodLabel();

  // 선택 기간 필터링
  const purch=allPurch.filter(r=>{const m=r.date.substring(0,7).replace('/','-');return selSet.has(m)});

  // 공급사별 집계
  const vendorAgg={};
  purch.forEach(r=>{
    const v=r.vendor;const m=r.date.substring(0,7).replace('/','-');
    if(!vendorAgg[v])vendorAgg[v]={name:v,total:0,qty:0,cnt:0,monthly:{}};
    vendorAgg[v].total+=r.amount;vendorAgg[v].qty+=r.qty;vendorAgg[v].cnt++;
    if(!vendorAgg[v].monthly[m])vendorAgg[v].monthly[m]={a:0,q:0,c:0};
    vendorAgg[v].monthly[m].a+=r.amount;vendorAgg[v].monthly[m].q+=r.qty;vendorAgg[v].monthly[m].c++;
  });
  const vendorList=Object.values(vendorAgg).sort((a,b)=>b.total-a.total);

  // 품목별 집계
  const itemAgg={};
  purch.forEach(r=>{
    const k=r.sku_id;const m=r.date.substring(0,7).replace('/','-');
    if(!itemAgg[k])itemAgg[k]={sku:k,name:r.name,total:0,qty:0,cnt:0,avgPrice:0,monthly:{}};
    itemAgg[k].total+=r.amount;itemAgg[k].qty+=r.qty;itemAgg[k].cnt++;
    if(!itemAgg[k].monthly[m])itemAgg[k].monthly[m]={a:0,q:0};
    itemAgg[k].monthly[m].a+=r.amount;itemAgg[k].monthly[m].q+=r.qty;
  });
  Object.values(itemAgg).forEach(i=>{i.avgPrice=i.qty>0?Math.round(i.total/i.qty):0});
  const itemList=Object.values(itemAgg).sort((a,b)=>b.total-a.total);

  // 월별 합계 (선택 기간 내)
  const mTotals=selMs.map(m=>allPurch.filter(r=>r.date.substring(0,7).replace('/','-')===m).reduce((s,r)=>s+r.amount,0));
  const mQtys=selMs.map(m=>allPurch.filter(r=>r.date.substring(0,7).replace('/','-')===m).reduce((s,r)=>s+r.qty,0));
  const totalAmt=purch.reduce((s,r)=>s+r.amount,0);
  const totalQty=purch.reduce((s,r)=>s+r.qty,0);
  const avgMonthly=selMs.length>0?totalAmt/selMs.length:0;

  // 전월 대비 (선택 기간의 마지막 월 vs 이전 월) — 크로스-연도 비교 지원
  let momChg=0;let momPrevLabel='';
  if(mTotals.length>=2){const last=mTotals[mTotals.length-1];const prev=mTotals[mTotals.length-2];momChg=prev>0?((last-prev)/prev*100).toFixed(1):0;momPrevLabel=selMs[selMs.length-2]}
  else if(selMs.length===1){
    const curIdx=allMs.indexOf(selMs[0]);
    if(curIdx>0){
      const prevM=allMs[curIdx-1];momPrevLabel=prevM;
      const prevAmt=allPurch.filter(r=>r.date.substring(0,7).replace('/','-')===prevM).reduce((s,r)=>s+r.amount,0);
      momChg=prevAmt>0?((totalAmt-prevAmt)/prevAmt*100).toFixed(1):0;
    } else if(curIdx===0){
      // 1월 선택 시 전년도 12월과 비교
      const prevYrPurch=yr==='2026'?(D.purch25||[]):(null);
      if(prevYrPurch){
        const prevYr=String(Number(yr)-1);const prevM=prevYr+'-12';momPrevLabel=prevM;
        const prevAmt=prevYrPurch.filter(r=>r.date.substring(0,7).replace('/','-')===prevM).reduce((s,r)=>s+r.amount,0);
        momChg=prevAmt>0?((totalAmt-prevAmt)/prevAmt*100).toFixed(1):0;
      }
    }
  }

  // TOP5 vendor share
  const top5Amt=vendorList.slice(0,5).reduce((s,v)=>s+v.total,0);
  const top5Pct=totalAmt>0?(top5Amt/totalAmt*100).toFixed(1):'0.0';

  // 전체 기간 대비 선택 기간 비중
  const allTotal=allPurch.reduce((s,r)=>s+r.amount,0);
  const periodPct=allTotal>0?(totalAmt/allTotal*100).toFixed(1):'100.0';

  return`<div class="kpi-sticky"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 style="font-size:18px">구매 분석</h2>${periodBar()}</div>
  ${noDataNotice()}
  <div class="kr">
    <div class="kc"><div class="lb">구매금액</div><div class="vl c-bl">${fmtM(totalAmt)}</div><div class="sb">${purch.length}건 (전체 대비 ${periodPct}%)</div></div>
    <div class="kc"><div class="lb">구매수량</div><div class="vl">${fmt(totalQty)}</div></div>
    <div class="kc"><div class="lb">월평균</div><div class="vl">${fmtM(avgMonthly)}</div><div class="sb">${selMs.length}개월 기준</div></div>
    <div class="kc"><div class="lb">거래 공급사</div><div class="vl c-pp">${vendorList.length}개</div></div>
    <div class="kc"><div class="lb">구매 품목</div><div class="vl">${itemList.length}종</div></div>
    <div class="kc"><div class="lb">TOP5 집중도</div><div class="vl c-rd">${top5Pct}%</div><div class="sb">상위5개사</div></div>
    <div class="kc"><div class="lb">전월비</div><div class="vl ${momChg>=0?'c-gn':'c-rd'}">${momChg>=0?'+':''}${momChg}%</div>${momPrevLabel?`<div class="sb">vs ${momPrevLabel.slice(2).replace('-','.')}월</div>`:''}</div>
  </div></div>
  <div class="g2">
    <div class="pn"><div class="pt">월별 구매 추이 <span class="badge">${mLabel}</span></div><div class="cc"><canvas id="cPurchTrend" aria-label="월별 구매 추이"></canvas></div></div>
    <div class="pn"><div class="pt">공급사 구매 비중 TOP 10 <span class="badge">${mLabel}</span></div><div class="cc-donut"><canvas id="cPurchVendor" aria-label="공급사 구매 비중"></canvas></div></div>
  </div>
  <div class="pn"><div class="pt">공급사별 구매 현황 <span class="badge">${mLabel} · ${vendorList.length}개사</span><button class="xlsx-btn" onclick="exportTableCSV(this,'공급사별구매')">📥 엑셀</button></div>
    <div class="st" style="max-height:500px"><table>
      <thead><tr><th>#</th><th>공급사</th><th class="tr">금액</th><th class="tr">비중</th><th class="tr">건수</th><th class="tr">수량</th>${selMs.map(m=>'<th class="tr">'+m.slice(5)+'월</th>').join('')}${selMs.length>=2?'<th class="tr">추이</th>':''}</tr></thead>
      <tbody>${vendorList.map((v,idx)=>{
        const pct=totalAmt>0?(v.total/totalAmt*100).toFixed(1):'0';
        const mVals=selMs.map(m=>(v.monthly[m]||{}).a||0);
        let trendHtml='';
        if(selMs.length>=2){const last=mVals[mVals.length-1];const prev=mVals[mVals.length-2];const tr=last>prev?'↑':last<prev?'↓':'→';const tc=last>prev?'var(--gn)':last<prev?'var(--rd)':'var(--tx2)';trendHtml='<td class="tr" style="color:'+tc+';font-weight:600">'+tr+'</td>'}
        const esc=v.name.replace(/'/g,"\\'");
        return`<tr class="clickable" onclick="openPurchVendor('${esc}')"><td style="color:var(--tx2);font-size:10px">${idx+1}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.name}</td>
          <td class="tr" style="font-weight:600">${fmtM(v.total)}</td>
          <td class="tr"><div style="display:flex;align-items:center;justify-content:flex-end;gap:4px"><div style="width:${Math.min(pct*1.5,80)}px;height:6px;background:var(--ac);border-radius:3px"></div><span style="font-size:10px">${pct}%</span></div></td>
          <td class="tr">${v.cnt}</td><td class="tr">${fmt(v.qty)}</td>
          ${mVals.map(a=>'<td class="tr">'+fmtM(a)+'</td>').join('')}
          ${trendHtml}</tr>`}).join('')}</tbody></table></div></div>
  <div class="pn"><div class="pt">품목별 구매 현황 TOP 30 <span class="badge">${mLabel} · ${itemList.length}종</span><button class="xlsx-btn" onclick="exportTableCSV(this,'품목별구매')">📥 엑셀</button></div>
